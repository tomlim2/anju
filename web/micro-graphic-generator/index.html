<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Micro Graphic Generator</title>
  <style>
    @import url("./fonts/fonts.css");

    :root {
      --bg: #f4f4ef;
      --ink: #10110f;
      --panel: rgba(244, 244, 239, 0.86);
      --hair: rgba(16, 17, 15, 0.2);
      --font-ui: "Noto Sans", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-ui);
    }

    body.is-dark {
      --bg: #111210;
      --ink: #f1f1e7;
      --panel: rgba(17, 18, 16, 0.86);
      --hair: rgba(241, 241, 231, 0.24);
    }

    main {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: grid;
      place-items: center;
    }

    #art {
      width: 100vw;
      height: 100vh;
      display: block;
      background: var(--bg);
      cursor: crosshair;
    }

    .controls {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 10;
      display: flex;
      gap: 7px;
      padding: 7px;
      border: 1px solid var(--ink);
      background: var(--panel);
      backdrop-filter: blur(10px);
    }

    button {
      appearance: none;
      min-width: 42px;
      height: 32px;
      border: 1px solid var(--ink);
      border-radius: 0;
      background: transparent;
      color: var(--ink);
      font: 700 11px/1 var(--font-ui);
      letter-spacing: 0;
      text-transform: uppercase;
      cursor: pointer;
    }

    button:hover,
    button:focus-visible,
    button[aria-pressed="true"] {
      background: var(--ink);
      color: var(--bg);
      outline: none;
    }

    .seed {
      position: fixed;
      left: 18px;
      bottom: 16px;
      z-index: 10;
      color: var(--ink);
      font: 700 10px/1.2 var(--font-ui);
      opacity: 0.62;
      user-select: none;
    }

    @media (max-width: 720px) {
      .controls {
        top: auto;
        right: 12px;
        bottom: 12px;
      }

      .seed {
        left: 12px;
        bottom: 58px;
      }
    }
  </style>
</head>
<body>
  <main>
    <svg id="art" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Generated typographic micro graphic"></svg>
  </main>
  <div class="controls" aria-label="Generator controls">
    <button id="lucky" type="button">Lucky</button>
    <button id="mode" type="button" aria-pressed="false">Tokens</button>
    <button id="png" type="button">PNG</button>
    <button id="svg" type="button">SVG</button>
    <button id="tone" type="button">Tone</button>
  </div>
  <div class="seed" id="seedLabel"></div>

  <script>
    const SVG_NS = "http://www.w3.org/2000/svg";
    const EXPORT_SCALE = 2;
    const MIN_VIEWPORT = { width: 900, height: 620 };
    const PADDING_TOKENS = {
      small: { ratio: 0.04, min: 10, max: 24 },
      medium: { ratio: 0.075, min: 16, max: 34 },
      large: { ratio: 0.1, min: 28, max: 64 }
    };
    const MARGIN_TOKENS = {
      small: { ratio: 0.018, min: 4, max: 10 },
      medium: { ratio: 0.035, min: 8, max: 18 },
      large: { ratio: 0.06, min: 14, max: 32 }
    };
    const TEXT_ALIGNMENTS = {
      left: "start",
      center: "middle",
      right: "end"
    };
    const TOKEN_ALIGNMENTS = ["left", "center", "right"];
    const DESIGN_TOKEN_SIZES = {
      small: { rowMode: "pairable", maxPerRow: 2 },
      medium: { rowMode: "single", maxPerRow: 1 },
      large: { rowMode: "exclusive", maxPerRow: 1 },
      xlarge: { rowMode: "exclusive", maxPerRow: 1 }
    };
    const MAJOR_TOKEN_RULES = {
      minSize: "large",
      maxPerLayout: 1
    };
    const SPIN_TOKENS = {
      none: 0,
      subtle: 1.2,
      medium: 2.8
    };
    const FONT_CSS_PATH = "./fonts/fonts.css";
    const TYPEFACES = {
      english: "\"Noto Sans\", \"Helvetica Neue\", Arial, sans-serif",
      mono: "\"Noto Sans Mono\", \"SFMono-Regular\", Menlo, Monaco, Consolas, monospace",
      korean: "\"Noto Sans KR\", \"Apple SD Gothic Neo\", sans-serif",
      hanja: "\"Noto Sans KR\", \"Noto Sans SC\", \"Apple SD Gothic Neo\", sans-serif",
      chinese: "\"Noto Sans SC\", \"Noto Sans KR\", \"Apple SD Gothic Neo\", sans-serif",
      ui: "\"Noto Sans\", \"Noto Sans KR\", \"Noto Sans SC\", \"Apple SD Gothic Neo\", sans-serif"
    };

    const art = document.querySelector("#art");
    const seedLabel = document.querySelector("#seedLabel");
    const controls = {
      lucky: document.querySelector("#lucky"),
      mode: document.querySelector("#mode"),
      png: document.querySelector("#png"),
      svg: document.querySelector("#svg"),
      tone: document.querySelector("#tone")
    };

    // Extension point: add vocabulary, date labels, and fake data labels here.
    const visualTokens = {
      koreanKeywords: [
        "접속", "검증", "회로", "출력", "신호", "제어", "기록", "연산",
        "동기", "방식", "전원", "해석", "단말", "기준", "응답", "흐름"
      ],
      hanjaKeywords: ["林"],
      greetingTokens: [
        { value: "안녕?", typeface: "korean" },
        { value: "你好?", typeface: "chinese" },
        { value: "HELLO?", typeface: "english" }
      ],
      englishKeywords: [
        "ACCESS", "OUTPUT", "VERIFIED", "STANDBY", "RUNNING", "SIGNAL",
        "VECTOR", "STATUS", "MODULE", "CIRCUIT", "LOCKED", "SYSTEM",
        "FIELD", "REPORT", "QUEUE", "INPUT"
      ],
      organizationPrefixes: [
        "RADIAN", "NOVA", "ATLAS", "ORBITAL", "CARGO", "COBALT",
        "SUMMIT", "VECTOR", "MERIDIAN", "HELIX", "AXIOM", "DELTA"
      ],
      organizationSuffixes: ["LABS", "WORKS", "STUDIO", "DIVISION", "SYSTEMS", "ENGINEERING", "INDUSTRIES", "OFFICE"],
      tableFieldLabels: ["LOT", "SPEC", "FREQ", "LOAD", "REV", "TEMP", "POWER", "LAT", "CFG"],
      dateTypography: {
        englishMonths: ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"],
        englishMonthShort: ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"],
        chineseDigits: ["〇", "一", "二", "三", "四", "五", "六", "七", "八", "九"],
        refreshedLabels: {
          korean: "갱신",
          english: "REFRESHED",
          chinese: "刷新"
        },
        timestampLabels: {
          korean: "타임스탬프",
          english: "TIMESTAMP",
          chinese: "时间戳"
        }
      }
    };

    const componentBorderModes = ["stroke", "no-stroke", "corner-stroke"];
    let seed = randomSeed();
    let activeComponentRatio = "";
    let activeBorderMode = "";
    let appMode = "random";
    let dark = false;

    function randomSeed() {
      return crypto.getRandomValues(new Uint32Array(1))[0] >>> 0;
    }

    function seedHex() {
      return seed.toString(16).toUpperCase().padStart(8, "0");
    }

    function seedSlug() {
      return seed.toString(16);
    }

    function cssVar(name) {
      return getComputedStyle(document.body).getPropertyValue(name).trim();
    }

    // Fit a single Component into the Canvas while preserving its own ratio.
    function fitComponentBox(containerW, containerH, ratio, scale = 0.72) {
      const maxW = containerW * scale;
      const maxH = containerH * scale;
      let boxW = maxW;
      let boxH = boxW * ratio.height / ratio.width;

      if (boxH > maxH) {
        boxH = maxH;
        boxW = boxH * ratio.width / ratio.height;
      }

      return {
        x: (containerW - boxW) / 2,
        y: (containerH - boxH) / 2,
        width: boxW,
        height: boxH
      };
    }

    function mulberry32(value) {
      return function random() {
        let t = value += 0x6D2B79F5;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    let random = mulberry32(seed);

    function r(min = 0, max = 1) {
      return min + (max - min) * random();
    }

    function ri(min, max) {
      return Math.floor(r(min, max + 1));
    }

    function pick(list) {
      return list[ri(0, list.length - 1)];
    }

    function chance(value) {
      return random() < value;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function paddingSize(w, h, size = "medium") {
      const token = PADDING_TOKENS[size] || PADDING_TOKENS.medium;
      const edge = Math.min(w, h);
      const cap = Math.max(4, edge * 0.24);
      return Math.min(cap, clamp(edge * token.ratio, token.min, token.max));
    }

    function marginSize(w, h, size = "medium") {
      const token = MARGIN_TOKENS[size] || MARGIN_TOKENS.medium;
      const edge = Math.min(w, h);
      const cap = Math.max(2, edge * 0.28);
      return Math.min(cap, clamp(edge * token.ratio, token.min, token.max));
    }

    function normalizeTokenAlign(align = "left") {
      return TOKEN_ALIGNMENTS.includes(align) ? align : "left";
    }

    function pickTokenAlign(preferred = "left", looseness = 0.35) {
      if (!chance(looseness)) return normalizeTokenAlign(preferred);
      return pick(TOKEN_ALIGNMENTS);
    }

    function normalizeDesignTokenSize(size = "medium") {
      return DESIGN_TOKEN_SIZES[size] ? size : "medium";
    }

    function tokenSizeAttrs(size = "medium") {
      const normalized = normalizeDesignTokenSize(size);
      return {
        "data-token-size": normalized,
        "data-row-mode": DESIGN_TOKEN_SIZES[normalized].rowMode
      };
    }

    function alignedBoxX(box, tokenWidth, align = "left") {
      const safeWidth = Math.min(tokenWidth, box.width);
      const normalized = normalizeTokenAlign(align);
      if (normalized === "center") return box.x + (box.width - safeWidth) / 2;
      if (normalized === "right") return box.x + box.width - safeWidth;
      return box.x;
    }

    function alignedTextX(box, align = "left") {
      const normalized = normalizeTokenAlign(align);
      if (normalized === "center") return box.x + box.width / 2;
      if (normalized === "right") return box.x + box.width;
      return box.x;
    }

    function spinAngle(size = "subtle", probability = 0.24) {
      const limit = SPIN_TOKENS[size] ?? SPIN_TOKENS.subtle;
      if (!limit || !chance(probability)) return 0;
      return r(-limit, limit);
    }

    function spinTransform(x, y, w, h, angle = 0) {
      if (!angle) return "";
      return `rotate(${angle.toFixed(2)} ${(x + w / 2).toFixed(2)} ${(y + h / 2).toFixed(2)})`;
    }

    function textSpinTransform(x, y, angle = 0) {
      if (!angle) return "";
      return `rotate(${angle.toFixed(2)} ${x.toFixed(2)} ${y.toFixed(2)})`;
    }

    function designTokenGroup(parent, x, y, w, h, attrs = {}) {
      const tokenSize = normalizeDesignTokenSize(attrs.tokenSize || "medium");
      const transform = spinTransform(x, y, w, h, attrs.spin || 0);
      const group = make("g", {
        ...tokenSizeAttrs(tokenSize),
        transform
      });
      parent.appendChild(group);
      return group;
    }

    function smallTokenPairZones(zone, rightWidth) {
      const gap = marginSize(zone.width, zone.height, "medium");
      const rightW = clamp(rightWidth, Math.min(48, zone.width * 0.36), zone.width * 0.46);
      return {
        left: {
          x: zone.x,
          y: zone.y,
          width: Math.max(1, zone.width - rightW - gap),
          height: zone.height
        },
        right: {
          x: zone.x + zone.width - rightW,
          y: zone.y,
          width: rightW,
          height: zone.height
        },
        gap
      };
    }

    function stackTextToken(g, zone, text, attrs = {}) {
      const align = normalizeTokenAlign(attrs.align || "left");
      const tokenSize = normalizeDesignTokenSize(attrs.tokenSize || "medium");
      const y = zone.y + zone.height * (attrs.baseline ?? 0.72);
      const x = alignedTextX(zone, align);
      const spin = attrs.spin || 0;
      g.appendChild(textNode(x, y, text, {
        ...attrs,
        align,
        tokenSize,
        maxWidth: attrs.maxWidth || zone.width,
        transform: attrs.transform || textSpinTransform(x, y, spin)
      }));
    }

    function paddedBox(x, y, w, h, size = "medium") {
      const pad = paddingSize(w, h, size);
      return {
        x: x + pad,
        y: y + pad,
        width: Math.max(1, w - pad * 2),
        height: Math.max(1, h - pad * 2),
        pad
      };
    }

    function componentPadding(w, h) {
      return paddingSize(w, h, "large");
    }

    function contentPadding(w, h) {
      return paddingSize(w, h, "medium");
    }

    function detailPadding(w, h) {
      return paddingSize(w, h, "small");
    }

    function contentZones(x, y, w, h) {
      const box = paddedBox(x, y, w, h, "medium");
      const gap = marginSize(box.width, box.height, "medium");
      const headerH = clamp(box.height * 0.1, 22, 38);
      const labelH = clamp(box.height * 0.085, 18, 32);
      const subH = clamp(box.height * 0.09, 18, 30);
      const detailH = clamp(box.height * 0.3, 64, Math.min(150, box.height * 0.38));

      const header = { x: box.x, y: box.y, width: box.width, height: headerH };
      const label = { x: box.x, y: header.y + header.height + gap, width: box.width, height: labelH };
      const detail = { x: box.x, y: box.y + box.height - detailH, width: box.width, height: detailH };
      const sub = { x: box.x, y: detail.y - gap - subH, width: box.width, height: subH };
      const mainY = label.y + label.height + gap;
      const main = {
        x: box.x,
        y: mainY,
        width: box.width,
        height: Math.max(28, sub.y - gap - mainY)
      };

      return { box, gap, header, label, main, sub, detail };
    }

    // SVG helpers.
    function hasHangul(value) {
      return /[가-힣]/.test(value);
    }

    function hasHanja(value) {
      return /[\u3400-\u4DBF\u4E00-\u9FFF\uF900-\uFAFF]/.test(value);
    }

    function resolveTypeface(text, attrs = {}) {
      if (attrs.typeface && TYPEFACES[attrs.typeface]) return TYPEFACES[attrs.typeface];
      if (attrs.mono) return TYPEFACES.mono;
      if (attrs.hanja || hasHanja(text)) return TYPEFACES.hanja;
      if (attrs.ko || hasHangul(text)) return TYPEFACES.korean;
      return TYPEFACES.english;
    }

    function estimateTextWidth(text, size, tracking = 0) {
      const value = String(text);
      const units = [...value].reduce((sum, char) => {
        if (/\s/.test(char)) return sum + 0.34;
        if (/[가-힣\u3400-\u4DBF\u4E00-\u9FFF\uF900-\uFAFF]/.test(char)) return sum + 1.02;
        if (/[MW@#%]/.test(char)) return sum + 0.82;
        if (/[A-Z0-9]/.test(char)) return sum + 0.64;
        if (/[a-z]/.test(char)) return sum + 0.56;
        if (/[.,:;'"!?/\\|()[\]{}<>-]/.test(char)) return sum + 0.38;
        return sum + 0.62;
      }, 0);
      return units * size + Math.max(0, value.length - 1) * tracking;
    }

    function estimateTextHeight(text, size) {
      const hasCjk = /[가-힣\u3400-\u4DBF\u4E00-\u9FFF\uF900-\uFAFF]/.test(String(text));
      return size * (hasCjk ? 1.14 : 1.02);
    }

    function fitTextSize(text, attrs = {}) {
      const size = attrs.size || 18;
      if (!attrs.maxWidth && !attrs.maxHeight) return size;
      const estimatedWidth = estimateTextWidth(text, size, attrs.tracking || 0);
      const estimatedHeight = estimateTextHeight(text, size);
      const widthRatio = attrs.maxWidth ? attrs.maxWidth / estimatedWidth : 1;
      const heightRatio = attrs.maxHeight ? attrs.maxHeight / estimatedHeight : 1;
      const fitRatio = Math.min(1, widthRatio, heightRatio);
      if (fitRatio >= 1) return size;
      const minSize = attrs.minSize || Math.max(8, size * 0.48);
      return Math.max(minSize, size * fitRatio);
    }

    function resolveTextAlignment(attrs = {}) {
      return TEXT_ALIGNMENTS[attrs.align] || TEXT_ALIGNMENTS.left;
    }

    function make(tag, attrs = {}, children = []) {
      const el = document.createElementNS(SVG_NS, tag);
      Object.entries(attrs).forEach(([key, value]) => {
        if (value !== undefined && value !== null) el.setAttribute(key, value);
      });
      children.forEach(child => el.appendChild(child));
      return el;
    }

    function textNode(x, y, text, attrs = {}) {
      const fontSize = fitTextSize(text, attrs);
      const tokenSize = attrs.tokenSize ? normalizeDesignTokenSize(attrs.tokenSize) : null;
      const el = make("text", {
        x,
        y,
        fill: "currentColor",
        "font-family": resolveTypeface(text, attrs),
        "font-size": fontSize,
        "font-weight": attrs.weight || 700,
        "letter-spacing": attrs.tracking || 0,
        "text-anchor": resolveTextAlignment(attrs),
        opacity: attrs.opacity ?? 1,
        transform: attrs.transform || "",
        ...(tokenSize ? tokenSizeAttrs(tokenSize) : {})
      });
      if (attrs.maxWidth) {
        const fittedWidth = estimateTextWidth(text, fontSize, attrs.tracking || 0);
        if (fittedWidth > attrs.maxWidth) {
          el.setAttribute("textLength", attrs.maxWidth);
          el.setAttribute("lengthAdjust", "spacingAndGlyphs");
        }
      }
      el.textContent = text;
      return el;
    }

    function line(x1, y1, x2, y2, attrs = {}) {
      return make("line", {
        x1, y1, x2, y2,
        stroke: "currentColor",
        "stroke-width": attrs.width || 2,
        "stroke-dasharray": attrs.dash || "",
        "stroke-linecap": "square",
        opacity: attrs.opacity ?? 1,
        filter: attrs.rough ? "url(#roughen)" : ""
      });
    }

    function rect(x, y, w, h, attrs = {}) {
      return make("rect", {
        x, y, width: w, height: h,
        fill: attrs.fill || "none",
        stroke: attrs.stroke === false ? "none" : "currentColor",
        "stroke-width": attrs.width || 2,
        "stroke-dasharray": attrs.dash || "",
        opacity: attrs.opacity ?? 1,
        filter: attrs.rough ? "url(#roughen)" : "",
        transform: attrs.transform || ""
      });
    }

    function polyline(points, attrs = {}) {
      return make("polyline", {
        points: points.map(point => point.join(",")).join(" "),
        fill: "none",
        stroke: "currentColor",
        "stroke-width": attrs.width || 2,
        "stroke-dasharray": attrs.dash || "",
        opacity: attrs.opacity ?? 1,
        filter: attrs.rough ? "url(#roughen)" : ""
      });
    }

    function defs() {
      const d = make("defs");
      const filter = make("filter", { id: "roughen", x: "-8%", y: "-8%", width: "116%", height: "116%" });
      filter.append(
        make("feTurbulence", { type: "fractalNoise", baseFrequency: "0.022", numOctaves: "2", seed: String(seed % 997), result: "noise" }),
        make("feDisplacementMap", { in: "SourceGraphic", in2: "noise", scale: "1.6", xChannelSelector: "R", yChannelSelector: "G" })
      );
      d.appendChild(filter);

      const dot = make("pattern", { id: "dotgrid", width: "12", height: "12", patternUnits: "userSpaceOnUse" });
      dot.appendChild(make("circle", { cx: "1.5", cy: "1.5", r: "1.5", fill: "currentColor", opacity: "0.55" }));
      d.appendChild(dot);
      return d;
    }

    // Visual token helpers.
    function codeToken() {
      return chance(0.46) ? `0X${ri(0, 255).toString(16).toUpperCase().padStart(2, "0")}` : `${ri(2, 9)}${ri(0, 9)}${ri(0, 9)}`;
    }

    function token(value, typeface, size = "medium") {
      return { value, typeface, size: normalizeDesignTokenSize(size) };
    }

    function pad2(value) {
      return String(value).padStart(2, "0");
    }

    function chineseDigitSequence(value) {
      return String(value)
        .split("")
        .map(char => visualTokens.dateTypography.chineseDigits[Number(char)])
        .join("");
    }

    function chineseNumber(value) {
      if (value < 10) return visualTokens.dateTypography.chineseDigits[value];
      if (value === 10) return "十";
      if (value < 20) return `十${visualTokens.dateTypography.chineseDigits[value - 10]}`;
      const tens = Math.floor(value / 10);
      const ones = value % 10;
      return `${visualTokens.dateTypography.chineseDigits[tens]}十${ones ? visualTokens.dateTypography.chineseDigits[ones] : ""}`;
    }

    function todayDateTypographyTokens(date = new Date()) {
      const year = date.getFullYear();
      const month = date.getMonth() + 1;
      const day = date.getDate();
      const hour = date.getHours();
      const minute = date.getMinutes();
      const second = date.getSeconds();
      const englishMonth = visualTokens.dateTypography.englishMonths[month - 1];
      const englishMonthShort = visualTokens.dateTypography.englishMonthShort[month - 1];
      const timestamp = `${pad2(hour)}:${pad2(minute)}:${pad2(second)}`;
      const epochTimestamp = String(date.getTime());
      const koreanMeridiem = hour < 12 ? "오전" : "오후";
      const koreanHour = hour % 12 || 12;
      const labels = visualTokens.dateTypography.refreshedLabels;
      const timestampLabels = visualTokens.dateTypography.timestampLabels;

      return [
        token(`${year}년 ${month}월 ${day}일`, "korean", "large"),
        token(`${year}년 ${month}월 ${day}일 ${koreanMeridiem} ${koreanHour}시 ${minute}분`, "korean", "large"),
        token(`${labels.korean} ${timestamp}`, "korean", "large"),
        token(`${timestampLabels.korean} ${epochTimestamp}`, "korean", "large"),
        token(`${month}월 ${day}일`, "korean", "large"),
        token(`${englishMonth} ${day}, ${year}`, "english", "large"),
        token(`${englishMonth} ${day}, ${year} ${timestamp}`, "english", "large"),
        token(`${pad2(day)} ${englishMonthShort} ${year}`, "english", "large"),
        token(`${labels.english} ${timestamp}`, "english", "large"),
        token(`${timestampLabels.english} ${epochTimestamp}`, "english", "large"),
        token(`${year}年${month}月${day}日`, "chinese", "large"),
        token(`${year}年${month}月${day}日 ${timestamp}`, "chinese", "large"),
        token(`${chineseDigitSequence(year)}年${chineseNumber(month)}月${chineseNumber(day)}日`, "chinese", "large"),
        token(`${labels.chinese} ${timestamp}`, "chinese", "large"),
        token(`${timestampLabels.chinese} ${epochTimestamp}`, "chinese", "large")

    function largeTypographyTokens() {
      return [
        ...visualTokens.koreanKeywords.map(value => token(value, "korean", "large")),
        ...visualTokens.englishKeywords.map(value => token(value, "english", "large")),

      ];
    }

    function xlargeTypographyTokens() {
      const heroKorean = visualTokens.koreanKeywords
        .filter(value => ["접속", "검증", "출력"].includes(value))
        .map(value => token(value, "korean", "xlarge"));
      const heroEnglish = visualTokens.englishKeywords
        .filter(value => ["ACCESS", "OUTPUT", "STATUS"].includes(value))
        .map(value => token(value, "english", "xlarge"));
      return [
        ...heroKorean,
        ...visualTokens.hanjaKeywords.map(value => token(value, "hanja", "xlarge")),
        ...visualTokens.greetingTokens.map(item => token(item.value, item.typeface, "xlarge")),
        ...heroEnglish
      ];
    }

    function pickXlargeTypography() {
      const tokens = [
        ...xlargeTypographyTokens(),
        token(codeToken(), "mono", "xlarge")
      ];
      return pick(tokens);
    }

    function pickPrimaryDisplayTypography() {
      return pickXlargeTypography();
    }

    // Graphic primitives.
    function label(g, x, y, w, value = pick(visualTokens.englishKeywords), fill = false, options = {}) {
      const tokenSize = normalizeDesignTokenSize(options.tokenSize || "medium");
      const target = designTokenGroup(g, x, y, w, 28, { tokenSize, spin: options.spin || 0 });
      const margin = marginSize(w, 28, "small");
      if (fill) {
        target.appendChild(rect(x, y, w, 28, { fill: "currentColor", stroke: false, opacity: 0.96 }));
        const text = textNode(x + w / 2, y + 20, value, { size: 15, align: "center", tokenSize, weight: 800, transform: "", opacity: 1, typeface: "english", maxWidth: w - margin * 2 });
        text.setAttribute("fill", "var(--bg)");
        target.appendChild(text);
      } else {
        target.appendChild(rect(x, y, w, 28, { width: 2, rough: true }));
        target.appendChild(textNode(x + w / 2, y + 20, value, { size: 15, align: "center", tokenSize, weight: 800, typeface: "english", maxWidth: w - margin * 2 }));
      }
    }

    function microBadgeWidth(value) {
      return Math.max(48, estimateTextWidth(value, 11) + marginSize(80, 21, "small") * 2);
    }

    function microBadge(g, x, y, value, options = {}) {
      const w = microBadgeWidth(value);
      const margin = marginSize(w, 21, "small");
      const target = designTokenGroup(g, x, y, w, 21, { tokenSize: "small", spin: options.spin || 0 });
      const badgeRect = rect(x, y, w, 21, { fill: chance(0.45) ? "currentColor" : "none", width: 1.5, rough: true });
      target.appendChild(badgeRect);
      const t = textNode(x + w / 2, y + 15, value, { size: 11, align: "center", tokenSize: "small", weight: 900, typeface: "mono", maxWidth: w - margin * 2 });
      if (badgeRect.getAttribute("fill") === "currentColor") t.setAttribute("fill", "var(--bg)");
      target.appendChild(t);
    }

    function ticks(g, x, y, w, count = 54) {
      if (w <= 0) return;
      g.appendChild(line(x, y, x + w, y, { width: 2, rough: true }));
      for (let i = 0; i <= count; i++) {
        const tx = x + w * (i / count);
        const tall = i % 10 === 0 ? 22 : i % 5 === 0 ? 16 : 9;
        g.appendChild(line(tx, y, tx, y - tall, { width: i % 10 === 0 ? 2 : 1.2, rough: true, opacity: 0.88 }));
      }
    }

    function barcodeDigits(length = 12) {
      return Array.from({ length }, () => String(ri(0, 9))).join("");
    }

    function upcChecksum(digits) {
      const sum = digits.split("").reduce((total, digit, index) => total + Number(digit) * (index % 2 === 0 ? 3 : 1), 0);
      return String((10 - (sum % 10)) % 10);
    }

    function upcPattern(digits) {
      const left = [
        "0001101", "0011001", "0010011", "0111101", "0100011",
        "0110001", "0101111", "0111011", "0110111", "0001011"
      ];
      const right = [
        "1110010", "1100110", "1101100", "1000010", "1011100",
        "1001110", "1010000", "1000100", "1001000", "1110100"
      ];
      const value = `${digits}${upcChecksum(digits)}`;
      const leftDigits = value.slice(0, 6);
      const rightDigits = value.slice(6, 12);
      const leftPattern = [...leftDigits].map(digit => left[Number(digit)]).join("");
      const rightPattern = [...rightDigits].map(digit => right[Number(digit)]).join("");
      return {
        value,
        pattern: `101${leftPattern}01010${rightPattern}101`
      };
    }

    function barcode(g, x, y, w, h, options = {}) {
      if (w <= 0 || h <= 0) return;
      const digits = options.digits || barcodeDigits(11);
      const { value, pattern } = upcPattern(digits);
      const captionH = options.caption === false || h < 34 ? 0 : Math.min(12, h * 0.22);
      const quiet = marginSize(w, h, "large");
      const availableW = Math.max(1, w - quiet * 2);
      const moduleW = availableW / pattern.length;
      const captionGap = captionH ? marginSize(w, h, "small") * 0.35 : 0;
      const barH = Math.max(6, h - captionH - captionGap);
      const guardRanges = [
        [0, 2],
        [45, 49],
        [92, 94]
      ];

      for (let i = 0; i < pattern.length; i++) {
        if (pattern[i] !== "1") continue;
        const isGuard = guardRanges.some(([start, end]) => i >= start && i <= end);
        const barX = x + quiet + i * moduleW;
        const barY = y + (isGuard ? 0 : Math.max(0, barH * 0.06));
        const height = isGuard ? Math.min(h - captionH * 0.35, barH + captionH * 0.45) : barH * r(0.84, 1);
        g.appendChild(rect(barX, barY, Math.max(0.7, moduleW * r(0.86, 1.06)), height, {
          fill: "currentColor",
          stroke: false,
          opacity: isGuard ? 0.98 : r(0.82, 0.96)
        }));
      }

      if (captionH) {
        const captionY = y + h - 1;
        const first = value[0];
        const leftDigits = value.slice(1, 6);
        const rightDigits = value.slice(6, 11);
        const last = value[11];
        g.appendChild(textNode(x, captionY, first, { size: captionH, minSize: 7, maxWidth: quiet * 0.8, tokenSize: "small", weight: 800, typeface: "mono" }));
        g.appendChild(textNode(x + quiet + availableW * 0.29, captionY, leftDigits, { size: captionH, minSize: 7, maxWidth: availableW * 0.32, tokenSize: "small", weight: 800, align: "center", typeface: "mono" }));
        g.appendChild(textNode(x + quiet + availableW * 0.72, captionY, rightDigits, { size: captionH, minSize: 7, maxWidth: availableW * 0.32, tokenSize: "small", weight: 800, align: "center", typeface: "mono" }));
        g.appendChild(textNode(x + w, captionY, last, { size: captionH, minSize: 7, maxWidth: quiet * 0.8, tokenSize: "small", weight: 800, align: "right", typeface: "mono" }));
      }
    }

    function pseudoQr(g, x, y, size, cells = 15) {
      if (size <= 0) return;
      const step = size / cells;
      g.appendChild(rect(x, y, size, size, { width: 0, fill: "transparent", stroke: false }));
      for (let row = 0; row < cells; row++) {
        for (let col = 0; col < cells; col++) {
          const finder =
            (row < 5 && col < 5) ||
            (row < 5 && col >= cells - 5) ||
            (row >= cells - 5 && col < 5);
          const ring = finder && (row === 0 || col === 0 || row === 4 || col === 4 || row === 1 && col === 1 || row === 2 && col === 2 || row === 3 && col === 3);
          if (ring || chance(0.42)) {
            g.appendChild(rect(x + col * step, y + row * step, step * 0.9, step * 0.9, { fill: "currentColor", stroke: false }));
          }
        }
      }
    }

    function miniTable(g, x, y, w, options = {}) {
      if (w <= 0) return;
      const rowH = 24;
      const maxRows = clamp(Math.floor((options.maxHeight || rowH * 5) / rowH), 2, 5);
      const rows = ri(Math.min(3, maxRows), maxRows);
      const h = rows * rowH;
      const cellMargin = marginSize(w, h, "small");
      const leftCellWidth = Math.max(10, w * 0.48 - cellMargin * 2);
      const rightCellWidth = Math.max(10, w * 0.52 - cellMargin * 2);
      g.appendChild(rect(x, y, w, h, { width: 1.5, rough: true }));
      g.appendChild(line(x + w * 0.48, y, x + w * 0.48, y + h, { width: 1.3, rough: true }));
      for (let i = 1; i < rows; i++) g.appendChild(line(x, y + i * rowH, x + w, y + i * rowH, { width: 1.2, rough: true }));

        g.appendChild(textNode(x + cellMargin, y + 17 + i * rowH, `${pick(visualTokens.tableFieldLabels)} ${ri(10, 99)}`, { size: 11, tokenSize: "small", weight: 800, typeface: "mono", maxWidth: leftCellWidth }));
        g.appendChild(textNode(x + w * 0.48 + cellMargin, y + 17 + i * rowH, `${pick(visualTokens.tableFieldLabels)} ${ri(1, 99)}${chance(0.5) ? "%" : ""}`, { size: 11, tokenSize: "small", weight: 800, typeface: "mono", maxWidth: rightCellWidth }));
      }

    function wave(g, x, y, w, h) {
      if (w <= 0 || h <= 0) return;
      const pts = [];
      const steps = 14;
      for (let i = 0; i <= steps; i++) {
        pts.push([x + w * (i / steps), y + h / 2 + Math.sin(i * r(0.9, 1.4)) * h * r(0.18, 0.42) + r(-8, 8)]);
      }
      g.appendChild(rect(x, y, w, h, { width: 1.5, rough: true, opacity: 0.75 }));

    // Content detail renderers.
    function renderBarcodeDetail(g, x, y, w, h) {
      const inset = detailPadding(w, h);
      const barH = Math.min(58, Math.max(26, h * 0.58));
      const barY = y + inset;
      barcode(g, x + inset, barY, w - inset * 2, barH);

    }

    function renderPseudoQrDetail(g, x, y, w, h) {

      const qrY = y + h - inset - q;

      g.appendChild(textNode(textX, qrY + q * 0.27, "ID", { size: 15, tokenSize: "medium", weight: 900, typeface: "mono", maxWidth: textMax }));

    function renderWaveDetail(g, x, y, w, h) {
      const inset = detailPadding(w, h);
      const waveH = Math.min(62, Math.max(28, h - inset * 2));
      wave(g, x + inset, y + h - inset - waveH, w - inset * 2, waveH);
    }

    function renderTableDetail(g, x, y, w, h) {
      const inset = detailPadding(w, h);
      const maxTableHeight = Math.max(48, h - inset * 2);
      const tableHeight = Math.min(120, maxTableHeight);
      miniTable(g, x + inset, y + h - inset - tableHeight, w - inset * 2, { maxHeight: tableHeight });

    function renderTicksDetail(g, x, y, w, h) {
      const inset = detailPadding(w, h);
      const tickY = y + Math.max(inset + 22, h - 48);
      ticks(g, x + inset, tickY, w - inset * 2, ri(24, 64));
      g.appendChild(textNode(x + inset, y + h - 18, `MOD ${ri(1, 99)} / PORT ${ri(10, 999)}`, { size: 12, tokenSize: "small", weight: 800, typeface: "mono", maxWidth: w - inset * 2 }));
    }

    // Extension point: add a detail renderer here, then use its id from a layout.
    const contentDetailModes = [
      { id: "barcode", weight: 34, render: renderBarcodeDetail },
      { id: "pseudo-qr", weight: 16, render: renderPseudoQrDetail },
      { id: "table", weight: 18, render: renderTableDetail },
      { id: "wave", weight: 14, render: renderWaveDetail },
      { id: "ticks", weight: 18, render: renderTicksDetail }
    ];

    function pickContentDetailMode(mode = "mixed") {
      if (mode !== "mixed") {
        return contentDetailModes.find(detail => detail.id === mode) || contentDetailModes[contentDetailModes.length - 1];
      }

      const totalWeight = contentDetailModes.reduce((sum, detail) => sum + detail.weight, 0);
      let cursor = r(0, totalWeight);
      for (const detail of contentDetailModes) {
        cursor -= detail.weight;
        if (cursor <= 0) return detail;
      }
      return contentDetailModes[contentDetailModes.length - 1];
    }

    function renderContentDetail(g, x, y, w, h, mode = "mixed") {
      const detailBox = paddedBox(x, y, w, h, "medium");
      pickContentDetailMode(mode).render(g, detailBox.x, detailBox.y, detailBox.width, detailBox.height);

    function contentPanel(x, y, w, h, mode = "mixed", options = {}) {
      const g = make("g", { opacity: r(0.78, 1) });

      if (chance(0.32)) {

    // Layout renderers.
    function renderStripLayout(w, h) {

    function renderSpecimenLayout(w, h) {

    function tokenGalleryItems() {

        token("MOD P31 / PORT 97", "mono", "medium"),
        token("RUNNING // PORT 640", "mono", "medium"),
        token("검증 완료", "korean", "medium"),
        token("출력 대기", "korean", "medium")
      ];

      const large = [
        ...largeTypographyTokens()
      ];
      const xlarge = [
        ...xlargeTypographyTokens(),
        token(codeToken(), "mono", "xlarge")
      ];

      return { small, medium, large, xlarge };
    }

    function renderTokenGallerySection(g, title, items, box, size) {
      const headerH = size === "xlarge" ? 32 : size === "large" ? 28 : 22;
      const gap = marginSize(box.width, box.height, "small");
      const bodyY = box.y + headerH + gap;
      const bodyH = Math.max(1, box.height - headerH - gap);
      const desiredCellW = size === "small" ? 108 : size === "medium" ? 145 : size === "large" ? 112 : 260;
      const cols = Math.max(1, Math.min(items.length, Math.floor(box.width / desiredCellW) || 1));
      const rows = Math.max(1, Math.ceil(items.length / cols));
      const cellW = box.width / cols;
      const cellH = bodyH / rows;
      const fontMax = size === "small" ? 11 : size === "medium" ? 15 : size === "large" ? 28 : 92;
      const fontScale = size === "xlarge" ? 1.7 : size === "large" ? 0.76 : 0.62;
      const fontSize = Math.max(6, Math.min(fontMax, cellH * fontScale));
      const titleSize = size === "xlarge" ? 18 : size === "large" ? 16 : 12;

      g.appendChild(textNode(box.x, box.y + headerH * 0.72, `${title} / ${items.length}`, { size: titleSize, tokenSize: "small", weight: 900, typeface: "english", maxWidth: box.width }));
      g.appendChild(line(box.x, box.y + headerH, box.x + box.width, box.y + headerH, { width: 1.4, rough: true, opacity: 0.75 }));

      items.forEach((item, index) => {
        const col = index % cols;
        const row = Math.floor(index / cols);
        const cell = {
          x: box.x + col * cellW,
          y: bodyY + row * cellH,
          width: cellW - gap,
          height: cellH
        };
        const align = TOKEN_ALIGNMENTS[index % TOKEN_ALIGNMENTS.length];
        stackTextToken(g, cell, item.value, {
          align,
          tokenSize: size,
          baseline: 0.68,
          size: fontSize,
          minSize: 7,
          weight: size === "large" || size === "xlarge" ? 900 : 800,
          typeface: item.typeface,
          opacity: size === "small" ? 0.78 : 0.92,
          maxWidth: cell.width
        });
      });
    }

    function renderPrimitiveGallery(g, box) {
      const gap = marginSize(box.width, box.height, "medium");
      const titleH = 22;
      const bodyY = box.y + titleH + gap;
      const cellW = (box.width - gap * 4) / 5;
      const cellH = Math.max(28, box.height - titleH - gap);
      g.appendChild(textNode(box.x, box.y + titleH * 0.72, "GRAPHIC PRIMITIVES", { size: 12, tokenSize: "small", weight: 900, typeface: "english", maxWidth: box.width }));
      g.appendChild(line(box.x, box.y + titleH, box.x + box.width, box.y + titleH, { width: 1.4, rough: true, opacity: 0.75 }));

      const cells = Array.from({ length: 5 }, (_, index) => ({
        x: box.x + index * (cellW + gap),
        y: bodyY,
        width: cellW,
        height: cellH
      }));

      barcode(g, cells[0].x, cells[0].y + cellH * 0.2, cells[0].width, cellH * 0.58, { caption: true });
      miniTable(g, cells[1].x, cells[1].y + cellH * 0.08, cells[1].width, { maxHeight: cellH * 0.86 });
      wave(g, cells[2].x, cells[2].y + cellH * 0.16, cells[2].width, cellH * 0.62);
      ticks(g, cells[3].x, cells[3].y + cellH * 0.72, cells[3].width, 36);
      pseudoQr(g, cells[4].x, cells[4].y + cellH * 0.08, Math.min(cells[4].width, cellH * 0.82), 15);
    }

    function renderTokenGallery(w, h) {
      const g = make("g", { "data-mode": "token-gallery" });
      const safe = paddedBox(0, 0, w, h, "large");
      const gap = marginSize(safe.width, safe.height, "medium");
      const headerH = 46;
      const primitiveH = Math.max(64, Math.min(96, safe.height * 0.14));
      const sectionH = Math.max(1, safe.height - headerH - primitiveH - gap * 4);
      const smallH = sectionH * 0.15;
      const mediumH = sectionH * 0.16;
      const largeH = sectionH * 0.29;
      const xlargeH = sectionH - smallH - mediumH - largeH - gap * 3;
      const items = tokenGalleryItems();

      g.appendChild(textNode(safe.x, safe.y + 26, "DESIGN TOKEN CATALOG", { size: 18, tokenSize: "medium", weight: 900, typeface: "english", maxWidth: safe.width * 0.62 }));
      g.appendChild(textNode(safe.x + safe.width, safe.y + 26, `S ${items.small.length} / M ${items.medium.length} / L ${items.large.length} / XL ${items.xlarge.length}`, { size: 12, tokenSize: "small", weight: 800, align: "right", typeface: "mono", maxWidth: safe.width * 0.36 }));
      g.appendChild(line(safe.x, safe.y + headerH, safe.x + safe.width, safe.y + headerH, { width: 1.6, rough: true, opacity: 0.85 }));

      const smallBox = { x: safe.x, y: safe.y + headerH + gap, width: safe.width, height: smallH };
      const mediumBox = { x: safe.x, y: smallBox.y + smallBox.height + gap, width: safe.width, height: mediumH };
      const largeBox = { x: safe.x, y: mediumBox.y + mediumBox.height + gap, width: safe.width, height: largeH };
      const xlargeBox = { x: safe.x, y: largeBox.y + largeBox.height + gap, width: safe.width, height: xlargeH };
      const primitiveBox = { x: safe.x, y: xlargeBox.y + xlargeBox.height + gap, width: safe.width, height: primitiveH };

      renderTokenGallerySection(g, "SMALL TOKENS", items.small, smallBox, "small");
      renderTokenGallerySection(g, "MEDIUM TOKENS", items.medium, mediumBox, "medium");
      renderTokenGallerySection(g, "LARGE TOKENS", items.large, largeBox, "large");
      renderTokenGallerySection(g, "XLARGE TOKENS", items.xlarge, xlargeBox, "xlarge");
      renderPrimitiveGallery(g, primitiveBox);

      return g;
    }

    // Canvas-level texture.
    function renderCanvasTexture(w, h) {
      const g = make("g", { opacity: 0.12 });
      const count = Math.floor((w * h) / 32000);
      for (let i = 0; i < count; i++) {
        if (chance(0.5)) {
          g.appendChild(line(r(0, w), r(0, h), r(0, w), r(0, h), { width: r(0.4, 1.2), opacity: r(0.2, 0.75) }));
        } else {
          g.appendChild(make("circle", { cx: r(0, w), cy: r(0, h), r: r(0.4, 1.4), fill: "currentColor" }));
        }
      }
      if (chance(0.34)) {
        const dg = make("g", { opacity: 0.35 });
        for (let y = 0; y < h; y += 18) dg.appendChild(line(0, y, w, y, { width: 0.7, opacity: 0.12 }));
        g.appendChild(dg);
      }
      return g;
    }

    // Extension point: add Component ratio templates here.
    const componentTemplates = [
      {
        label: "component 1:1",
        ratio: { width: 1, height: 1 },
        scale: 0.72,
        render: renderSpecimenLayout
      },
      {
        label: "component 2:3",
        ratio: { width: 2, height: 3 },
        scale: 0.78,
        render: renderPanelLayout
      },
      {
        label: "component 2:5",
        ratio: { width: 2, height: 5 },
        scale: 0.82,
        render: renderPanelLayout
      },
      {
        label: "component 3:2",
        ratio: { width: 3, height: 2 },
        scale: 0.78,
        render: renderStripLayout
      },
      {
        label: "component 5:2",
        ratio: { width: 5, height: 2 },
        scale: 0.82,
        render: renderStripLayout
      },
      {
        label: "component 4:3",
        ratio: { width: 4, height: 3 },
        scale: 0.8,
        render: renderStripLayout
      },
      {
        label: "component 3:4",
        ratio: { width: 3, height: 4 },
        scale: 0.8,
        render: renderPanelLayout
      }
    ];

    function renderComponentBorder(w, h, mode) {
      const g = make("g", { "data-border": mode });
      if (mode === "no-stroke") return g;

      if (mode === "stroke") {
        g.appendChild(rect(1, 1, w - 2, h - 2, { width: 2, rough: true, opacity: 0.9 }));
        return g;
      }

      const inset = 8;
      const x0 = inset;
      const y0 = inset;
      const x1 = w - inset;
      const y1 = h - inset;
      const length = Math.min(72, Math.max(38, Math.min(w, h) * 0.18));
      const attrs = { width: 2.4, opacity: 0.94 };
      g.append(
        line(x0, y0, x0 + length, y0, attrs),
        line(x0, y0, x0, y0 + length, attrs),
        line(x1, y0, x1 - length, y0, attrs),
        line(x1, y0, x1, y0 + length, attrs),
        line(x0, y1, x0 + length, y1, attrs),
        line(x0, y1, x0, y1 - length, attrs),
        line(x1, y1, x1 - length, y1, attrs),
        line(x1, y1, x1, y1 - length, attrs)
      );
      return g;
    }

    function renderComponent(boardW, boardH) {
      const component = pick(componentTemplates);
      const borderMode = pick(componentBorderModes);
      activeComponentRatio = component.label.replace("component ", "");
      activeBorderMode = borderMode;
      const box = fitComponentBox(boardW, boardH, component.ratio, component.scale);
      const layer = make("svg", {
        x: box.x,
        y: box.y,
        width: box.width,
        height: box.height,
        viewBox: `0 0 ${box.width} ${box.height}`,
        overflow: "hidden",
        "data-component": component.label
      });
      layer.appendChild(component.render(box.width, box.height));
      layer.appendChild(renderComponentBorder(box.width, box.height, borderMode));
      return layer;
    }

    function render(nextSeed = randomSeed()) {
      seed = nextSeed;
      random = mulberry32(seed);
      const w = Math.max(MIN_VIEWPORT.width, window.innerWidth);
      const h = Math.max(MIN_VIEWPORT.height, window.innerHeight);
      art.setAttribute("viewBox", `0 0 ${w} ${h}`);
      art.setAttribute("style", "color: var(--ink)");
      art.replaceChildren(defs());
      document.body.classList.toggle("is-dark", dark);

      const bg = make("rect", { x: 0, y: 0, width: w, height: h, fill: "var(--bg)" });
      art.appendChild(bg);
      art.appendChild(renderCanvasTexture(w, h));
      if (appMode === "tokens") {
        activeComponentRatio = "token gallery";
        activeBorderMode = "catalog";
        art.appendChild(renderTokenGallery(w, h));
        seedLabel.textContent = `MODE TOKENS / SEED ${seedHex()}`;
      } else {
        art.appendChild(renderComponent(w, h));
        seedLabel.textContent = `SEED ${seedHex()} / COMP ${activeComponentRatio} / BORDER ${activeBorderMode}`;
      }
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function svgText() {
      const clone = art.cloneNode(true);
      clone.setAttribute("xmlns", SVG_NS);
      clone.setAttribute("width", String(window.innerWidth));
      clone.setAttribute("height", String(window.innerHeight));
      clone.style.background = cssVar("--bg");
      const style = document.createElementNS(SVG_NS, "style");
      style.textContent = `
        @import url("${new URL(FONT_CSS_PATH, window.location.href).href}");
        svg { color: ${cssVar("--ink")}; }
        text { dominant-baseline: auto; }
      `;
      clone.insertBefore(style, clone.firstChild);
      return `<?xml version="1.0" encoding="UTF-8"?>\n${new XMLSerializer().serializeToString(clone)}`;
    }

    async function exportPng() {
      const source = svgText();
      const blob = new Blob([source], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.decoding = "async";
      img.src = url;
      await img.decode();
      const canvas = document.createElement("canvas");
      canvas.width = window.innerWidth * EXPORT_SCALE;
      canvas.height = window.innerHeight * EXPORT_SCALE;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = cssVar("--bg");
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      canvas.toBlob(pngBlob => downloadBlob(pngBlob, `micro-graphic-${seedSlug()}.png`), "image/png");
    }

    function exportSvg() {
      downloadBlob(new Blob([svgText()], { type: "image/svg+xml;charset=utf-8" }), `micro-graphic-${seedSlug()}.svg`);
    }

    function bindEvents() {
      controls.lucky.addEventListener("click", () => render());
      controls.mode.addEventListener("click", () => {
        appMode = appMode === "random" ? "tokens" : "random";
        controls.mode.textContent = appMode === "tokens" ? "Random" : "Tokens";
        controls.mode.setAttribute("aria-pressed", String(appMode === "tokens"));
        render(seed);
      });
      controls.png.addEventListener("click", exportPng);
      controls.svg.addEventListener("click", exportSvg);
      controls.tone.addEventListener("click", () => {
        dark = !dark;
        render(seed);
      });
      art.addEventListener("click", () => render());
      window.addEventListener("resize", () => render(seed));
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function loadTypefaces() {
      if (!document.fonts) return;

      const ready = Promise.allSettled([
        document.fonts.load(`900 80px ${TYPEFACES.english}`),
        document.fonts.load(`900 80px ${TYPEFACES.korean}`),
        document.fonts.load(`900 80px ${TYPEFACES.mono}`),
        document.fonts.load(`900 80px ${TYPEFACES.chinese}`)
      ]).then(() => document.fonts.ready);

      ready.then(() => render(seed)).catch(() => {});
      await Promise.race([ready, wait(900)]);
    }

    async function start() {
      bindEvents();
      await loadTypefaces();
      render(seed);
    }

    start();
  </script>
</body>
</html>
