<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Micro Graphic Generator</title>
  <style>
    @import url("./fonts/fonts.css");

    :root {
      --bg: #f4f4ef;
      --ink: #10110f;
      --panel: #f4f4ef;
      --hair: rgba(16, 17, 15, 0.2);
      --font-ui: "SUIT", "Noto Sans", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-ui);
    }

    body.is-dark {
      --bg: #111210;
      --ink: #f1f1e7;
      --panel: #111210;
      --hair: rgba(241, 241, 231, 0.24);
    }

    main {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: grid;
      place-items: center;
    }

    #art {
      width: 100vw;
      height: 100vh;
      display: block;
      background: var(--bg);
      cursor: crosshair;
    }

    .controls {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 10;
      display: flex;
      gap: 7px;
      padding: 7px;
      border: 1px solid var(--ink);
      background: var(--panel);
    }

    button {
      appearance: none;
      min-width: 42px;
      height: 32px;
      border: 1px solid var(--ink);
      border-radius: 0;
      background: transparent;
      color: var(--ink);
      font: bold 11px/1 var(--font-ui);
      letter-spacing: 0;
      text-transform: uppercase;
      cursor: pointer;
    }

    button:hover,
    button:focus-visible,
    button[aria-pressed="true"] {
      background: var(--ink);
      color: var(--bg);
      outline: none;
    }

    .seed {
      position: fixed;
      left: 18px;
      bottom: 16px;
      z-index: 10;
      color: var(--ink);
      font: bold 10px/1.2 var(--font-ui);
      opacity: 0.62;
      user-select: none;
    }

    @media (max-width: 720px) {
      .controls {
        top: auto;
        right: 12px;
        bottom: 12px;
      }

      .seed {
        left: 12px;
        bottom: 58px;
      }
    }
  </style>
</head>

    const componentBorderModes = ["stroke", "no-stroke", "corner-stroke"];
    const LAYOUT_GRID = { columns: 3, rows: 3 };
    const GRID_PRIMARY_CHANCE = 1;
    const UNIQUE_GRID_TOKEN_ROLES = ["barcode", "pseudo-qr"];
    let seed = randomSeed();
    let activeComponentRatio = "";
    let activeBorderMode = "";
    let activeBlockLayout = "";
    let blockOutlinesVisible = true;
    let appMode = "random";
    let dark = false;

    function randomSeed() {
      return crypto.getRandomValues(new Uint32Array(1))[0] >>> 0;
    }

    function seedHex() {
      return seed.toString(16).toUpperCase().padStart(8, "0");
    }

    function seedSlug() {
      return seed.toString(16);
    }

    function cssVar(name) {
      return getComputedStyle(document.body).getPropertyValue(name).trim();
    }

    // Fit a single Component into the Canvas while preserving its own ratio.
    function fitComponentBox(containerW, containerH, ratio, scale = 0.72) {
      const maxW = containerW * scale;
      const maxH = containerH * scale;
      let boxW = maxW;
      let boxH = boxW * ratio.height / ratio.width;

      if (boxH > maxH) {
        boxH = maxH;
        boxW = boxH * ratio.width / ratio.height;
      }

      return {
        x: (containerW - boxW) / 2,
        y: (containerH - boxH) / 2,
        width: boxW,
        height: boxH
      };
    }

    function mulberry32(value) {
      return function random() {
        let t = value += 0x6D2B79F5;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    let random = mulberry32(seed);

    function r(min = 0, max = 1) {
      return min + (max - min) * random();
    }

    function ri(min, max) {
      return Math.floor(r(min, max + 1));
    }

    function pick(list) {
      return list[ri(0, list.length - 1)];
    }

    function chance(value) {
      return random() < value;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function paddingSize(w, h, size = "medium") {
      const token = PADDING_TOKENS[size] || PADDING_TOKENS.medium;
      const edge = Math.min(w, h);
      const cap = Math.max(4, edge * 0.24);
      return Math.min(cap, clamp(edge * token.ratio, token.min, token.max));
    }

    function marginSize(w, h, size = "medium") {
      const token = MARGIN_TOKENS[size] || MARGIN_TOKENS.medium;
      const edge = Math.min(w, h);
      const cap = Math.max(2, edge * 0.28);
      return Math.min(cap, clamp(edge * token.ratio, token.min, token.max));
    }

    function normalizeTokenAlign(align = "left") {
      return TOKEN_ALIGNMENTS.includes(align) ? align : "left";
    }

    function pickTokenAlign(preferred = "left", looseness = 0.35) {
      if (!chance(looseness)) return normalizeTokenAlign(preferred);
      return pick(TOKEN_ALIGNMENTS);
    }

    function normalizeDesignTokenSize(size = "medium") {
      return DESIGN_TOKEN_SIZES[size] ? size : "medium";
    }

    function normalizeFontWeight(weight = "normal") {
      if (weight === "normal" || weight === FONT_WEIGHTS.normal) return "normal";
      return "bold";
    }

    function fontWeightForToken(size, tokenFunction) {
      const normalizedSize = normalizeDesignTokenSize(size);
      return tokenFunction === "content" && BOLD_TOKEN_SIZES.includes(normalizedSize) ? "bold" : "normal";
    }

    function normalizeStrokeWeight(weight = ACTIVE_STROKE_WEIGHTS[0]) {
      return ACTIVE_STROKE_WEIGHTS.includes(weight) ? weight : ACTIVE_STROKE_WEIGHTS[0];
    }

    function strokeTokenAttrs(weight) {
      const normalized = normalizeStrokeWeight(weight);
      return {
        "stroke-width": STROKE_WEIGHTS[normalized],
        "data-stroke-weight": normalized
      };
    }

    function tokenSizeAttrs(size = "medium") {
      const normalized = normalizeDesignTokenSize(size);
      return {
        "data-token-size": normalized,
        "data-row-mode": DESIGN_TOKEN_SIZES[normalized].rowMode
      };
    }

    function tokenTaxonomyAttrs({ form, tokenFunction, role, typeface = null, context = "component" }) {
      if (!TOKEN_FORMS.includes(form)) throw new Error(`Unknown token form: ${form}`);
      if (!TOKEN_FUNCTIONS.includes(tokenFunction)) throw new Error(`Unknown token function: ${tokenFunction}`);
      if (!role) throw new Error("Token role is required");
      if (!TOKEN_CONTEXTS.includes(context)) throw new Error(`Unknown token context: ${context}`);
      if (form === "typography" && !TYPEFACES[typeface]) {
        throw new Error(`Typography token requires a known typeface: ${typeface}`);
      }

      return {
        "data-token-form": form,
        "data-token-function": tokenFunction,
        "data-token-role": role,
        "data-token-context": context,
        ...(form === "typography" ? { "data-token-typeface": typeface } : {})
      };
    }

    function alignedBoxX(box, tokenWidth, align = "left") {
      const safeWidth = Math.min(tokenWidth, box.width);
      const normalized = normalizeTokenAlign(align);
      if (normalized === "center") return box.x + (box.width - safeWidth) / 2;
      if (normalized === "right") return box.x + box.width - safeWidth;
      return box.x;
    }

    function alignedTextX(box, align = "left") {
      const normalized = normalizeTokenAlign(align);
      if (normalized === "center") return box.x + box.width / 2;
      if (normalized === "right") return box.x + box.width;
      return box.x;
    }

    function spinAngle(size = "subtle", probability = 0.24) {
      const limit = SPIN_TOKENS[size] ?? SPIN_TOKENS.subtle;
      if (!limit || !chance(probability)) return 0;
      return r(-limit, limit);
    }

    function spinTransform(x, y, w, h, angle = 0) {
      if (!angle) return "";
      return `rotate(${angle.toFixed(2)} ${(x + w / 2).toFixed(2)} ${(y + h / 2).toFixed(2)})`;
    }

    function textSpinTransform(x, y, angle = 0) {
      if (!angle) return "";
      return `rotate(${angle.toFixed(2)} ${x.toFixed(2)} ${y.toFixed(2)})`;
    }

    function designTokenGroup(parent, x, y, w, h, attrs = {}) {
      const tokenSize = normalizeDesignTokenSize(attrs.tokenSize || "medium");
      const transform = spinTransform(x, y, w, h, attrs.spin || 0);
      const group = make("g", {
        ...tokenSizeAttrs(tokenSize),
        ...tokenTaxonomyAttrs({
          form: attrs.form || "graphic",
          tokenFunction: attrs.tokenFunction,
          role: attrs.tokenRole,
          typeface: attrs.typeface,
          context: attrs.tokenContext || "component"
        }),
        transform
      });
      parent.appendChild(group);
      return group;
    }

    function graphicTokenGroup(parent, tokenFunction, tokenRole, tokenContext = "primitive-detail", tokenSize = "medium") {
      const group = make("g", {
        ...tokenTaxonomyAttrs({
          form: "graphic",
          tokenFunction,
          role: tokenRole,
          context: tokenContext
        }),
        ...tokenSizeAttrs(tokenSize)
      });
      parent.appendChild(group);
      return group;
    }

    function smallTokenPairZones(zone, rightWidth) {
      const gap = marginSize(zone.width, zone.height, "medium");
      const rightW = clamp(rightWidth, Math.min(48, zone.width * 0.36), zone.width * 0.46);
      return {
        left: {
          x: zone.x,
          y: zone.y,
          width: Math.max(1, zone.width - rightW - gap),
          height: zone.height
        },
        right: {
          x: zone.x + zone.width - rightW,
          y: zone.y,
          width: rightW,
          height: zone.height
        },
        gap
      };
    }

    function stackTextToken(g, zone, text, attrs = {}) {
      const align = normalizeTokenAlign(attrs.align || "left");
      const tokenSize = normalizeDesignTokenSize(attrs.tokenSize || "medium");

        align,
        tokenSize,

    function paddedBox(x, y, w, h, size = "medium") {
      const pad = paddingSize(w, h, size);

        y: y + pad,
        width: Math.max(1, w - pad * 2),
        height: Math.max(1, h - pad * 2),
        pad

      const gap = marginSize(box.width, box.height, "medium");
      const headerH = clamp(box.height * 0.1, 22, 38);
      const labelH = clamp(box.height * 0.085, 18, 32);
      const subH = clamp(box.height * 0.09, 18, 30);
      const detailH = clamp(box.height * 0.3, 64, Math.min(150, box.height * 0.38));

      const header = { x: box.x, y: box.y, width: box.width, height: headerH };
      const label = { x: box.x, y: header.y + header.height + gap, width: box.width, height: labelH };
      const detail = { x: box.x, y: box.y + box.height - detailH, width: box.width, height: detailH };
      const sub = { x: box.x, y: detail.y - gap - subH, width: box.width, height: subH };
      const mainY = label.y + label.height + gap;
      const main = {
        x: box.x,
        y: mainY,

        if (/[가-힣\u3400-\u4DBF\u4E00-\u9FFF\uF900-\uFAFF]/.test(char)) return sum + 1.02;
        if (/[MW@#%]/.test(char)) return sum + 0.82;
        if (/[A-Z0-9]/.test(char)) return sum + 0.64;
        if (/[a-z]/.test(char)) return sum + 0.56;
        if (/[.,:;'"!?/\\|()[\]{}<>-]/.test(char)) return sum + 0.38;

      const estimatedHeight = estimateTextHeight(text, size);
      const widthRatio = attrs.maxWidth ? attrs.maxWidth / estimatedWidth : 1;

        role: attrs.tokenRole,
        typeface: attrs.typeface,
        context: attrs.tokenContext || "component"

        y,

        transform: attrs.transform || ""

    function typographyToken(value, options) {

        function: options.function,
        role: options.role,
        typeface: options.typeface,
        size,
        weight: fontWeightForToken(size, options.function),

        tokenFunction: definition.function,
        role: definition.role,

        .join("");

    function chineseNumber(value) {

      if (value === 10) return "十";
      if (value < 20) return `十${visualTokens.dateTypography.chineseDigits[value - 10]}`;
      const tens = Math.floor(value / 10);
      const ones = value % 10;
      return `${visualTokens.dateTypography.chineseDigits[tens]}十${ones ? visualTokens.dateTypography.chineseDigits[ones] : ""}`;
    }

    function todayDateTypographyTokens(date = new Date()) {
      const year = date.getFullYear();
      const month = date.getMonth() + 1;
      const day = date.getDate();
      const hour = date.getHours();
      const minute = date.getMinutes();
      const second = date.getSeconds();
      const englishMonth = visualTokens.dateTypography.englishMonths[month - 1];
      const englishMonthShort = visualTokens.dateTypography.englishMonthShort[month - 1];
      const timestamp = `${pad2(hour)}:${pad2(minute)}:${pad2(second)}`;
      const epochTimestamp = String(date.getTime());
      const koreanMeridiem = hour < 12 ? "오전" : "오후";
      const koreanHour = hour % 12 || 12;
      const labels = visualTokens.dateTypography.refreshedLabels;
      const timestampLabels = visualTokens.dateTypography.timestampLabels;
      const dateToken = (value, typeface) => typographyToken(value, {
        typeface,
        size: "large",
        function: "content",
        role: "date-time"
      });

        dateToken(`${year}년 ${month}월 ${day}일`, "korean"),
        dateToken(`${year}년 ${month}월 ${day}일 ${koreanMeridiem} ${koreanHour}시 ${minute}분`, "korean"),
        dateToken(`${labels.korean} ${timestamp}`, "korean"),
        dateToken(`${timestampLabels.korean} ${epochTimestamp}`, "korean"),
        dateToken(`${month}월 ${day}일`, "korean"),
        dateToken(`${englishMonth} ${day}, ${year}`, "english"),
        dateToken(`${englishMonth} ${day}, ${year} ${timestamp}`, "english"),
        dateToken(`${pad2(day)} ${englishMonthShort} ${year}`, "english"),
        dateToken(`${labels.english} ${timestamp}`, "english"),
        dateToken(`${timestampLabels.english} ${epochTimestamp}`, "english"),

        dateToken(`${year}年${month}月${day}日 ${timestamp}`, "chinese"),

        dateToken(`${timestampLabels.chinese} ${epochTimestamp}`, "chinese")

        typographyToken(item.english, { typeface: "english", size, function: "content", role: "action-keyword" }),

    function largeTypographyTokens() {

      return [
        ...visualTokens.koreanKeywords
          .filter(value => !reservedForXlarge.has(value))
          .map(value => typographyToken(value, { typeface: "korean", size: "large", function: "content", role: "display-keyword" })),
        ...visualTokens.englishKeywords
          .filter(value => !reservedForMedium.has(value) && !reservedForXlarge.has(value))
          .map(value => typographyToken(value, { typeface: "english", size: "large", function: "content", role: "display-keyword" })),
        ...hanjaTypographyTokens("large"),
        ...actionTypographyTokens("large"),
        ...todayDateTypographyTokens()

    }

    function xlargeTypographyTokens() {
      return [

    function xxlargeTypographyTokens() {

        .map(value => typographyToken(value, { typeface: "korean", size: "xxlarge", function: "content", role: "hero-keyword" }));

        size: "xxxlarge",
        function: item.function,
        role: item.role

        tokenRole,

        form: "graphic",
        tokenFunction: "sign",
        tokenRole: "metadata-badge",
        tokenContext: options.tokenContext || "component"

      ];
      const right = [
        "1110010", "1100110", "1101100", "1000010", "1011100",
        "1001110", "1010000", "1000100", "1001000", "1110100"
      ];
      const value = `${digits}${upcChecksum(digits)}`;
      const leftDigits = value.slice(0, 6);
      const rightDigits = value.slice(6, 12);
      const leftPattern = [...leftDigits].map(digit => left[Number(digit)]).join("");
      const rightPattern = [...rightDigits].map(digit => right[Number(digit)]).join("");

        [45, 49],
        [92, 94]

        const barY = y + (isGuard ? 0 : Math.max(0, barH * 0.06));

        const leftDigits = value.slice(1, 6);
        const rightDigits = value.slice(6, 11);

        target.appendChild(textNode(x + w, captionY, last, { size: captionFontSize, tokenSize: captionTokenSize, tokenFunction: "data", tokenRole: "barcode-caption", tokenContext: options.tokenContext || "primitive-detail", align: "right", typeface: "mono" }));
      }
    }

    function pseudoQr(g, x, y, size, cells = 15, options = {}) {
      if (size <= 0) return;
      const target = graphicTokenGroup(g, "data", "pseudo-qr", options.tokenContext || "primitive-detail", options.tokenSize || "medium");
      const step = size / cells;
      target.appendChild(rect(x, y, size, size, { fill: "transparent", stroke: false }));
      for (let row = 0; row < cells; row++) {

            (row < 5 && col >= cells - 5) ||
            (row >= cells - 5 && col < 5);

    function miniTable(g, x, y, w, options = {}) {
      if (w <= 0) return;

      const rowH = 24;
      const maxRows = clamp(Math.floor((options.maxHeight || rowH * 5) / rowH), 2, 5);
      const rows = ri(Math.min(3, maxRows), maxRows);
      const h = rows * rowH;
      const cellMargin = marginSize(w, h, "small");
      const leftCellWidth = Math.max(10, w * 0.48 - cellMargin * 2);
      const rightCellWidth = Math.max(10, w * 0.52 - cellMargin * 2);
      target.appendChild(rect(x, y, w, h));
      target.appendChild(line(x + w * 0.48, y, x + w * 0.48, y + h));
      for (let i = 1; i < rows; i++) target.appendChild(line(x, y + i * rowH, x + w, y + i * rowH));
      for (let i = 0; i < rows; i++) {
        target.appendChild(textNode(x + cellMargin, y + 17 + i * rowH, `${pick(visualTokens.tableFieldLabels)} ${ri(10, 99)}`, { size: 11, tokenSize: "small", tokenFunction: "data", tokenRole: "table-cell", tokenContext: options.tokenContext || "primitive-detail", typeface: "mono", maxWidth: leftCellWidth }));
        target.appendChild(textNode(x + w * 0.48 + cellMargin, y + 17 + i * rowH, `${pick(visualTokens.tableFieldLabels)} ${ri(1, 99)}${chance(0.5) ? "%" : ""}`, { size: 11, tokenSize: "small", tokenFunction: "data", tokenRole: "table-cell", tokenContext: options.tokenContext || "primitive-detail", typeface: "mono", maxWidth: rightCellWidth }));
      }
    }

    function wave(g, x, y, w, h, options = {}) {
      if (w <= 0 || h <= 0) return;
      const target = graphicTokenGroup(g, "data", "wave", options.tokenContext || "primitive-detail", options.tokenSize || "medium");
      const pts = [];
      const steps = 14;
      for (let i = 0; i <= steps; i++) {
        const pointY = y + h / 2 + Math.sin(i * r(0.9, 1.4)) * h * r(0.18, 0.42) + r(-8, 8);
        pts.push([x + w * (i / steps), clamp(pointY, y, y + h)]);
      }
      target.appendChild(rect(x, y, w, h, { opacity: 0.75 }));
      for (let i = 1; i < 4; i++) target.appendChild(line(x, y + h * (i / 4), x + w, y + h * (i / 4), { dash: "2 9", opacity: 0.45 }));
      target.appendChild(polyline(pts));
    }

    // Content detail renderers.
    function renderBarcodeDetail(g, x, y, w, h) {
      const inset = detailPadding(w, h);
      const barH = Math.min(58, Math.max(26, h * 0.58));
      const barY = y + inset;
      barcode(g, x + inset, barY, w - inset * 2, barH);
      g.appendChild(textNode(x + inset, y + h - 26, `SN ${ri(1000, 9999)}-${ri(1000, 9999)}-${String.fromCharCode(65 + ri(0, 25))}${String.fromCharCode(65 + ri(0, 25))}`, { size: 11, tokenSize: "small", tokenFunction: "data", tokenRole: "serial", tokenContext: "primitive-detail", typeface: "mono", maxWidth: w - inset * 2 }));
    }

    function renderPseudoQrDetail(g, x, y, w, h) {
      const inset = detailPadding(w, h);
      const q = Math.max(28, Math.min(96, w * 0.33, h * 0.42));
      const qrY = y + h - inset - q;
      const textGap = marginSize(w, h, "medium");
      const textX = x + inset + q + textGap;
      const textMax = Math.max(28, x + w - inset - textX);
      pseudoQr(g, x + inset, qrY, q);
      g.appendChild(textNode(textX, qrY + q * 0.27, "ID", { size: 15, tokenSize: "medium", tokenFunction: "data", tokenRole: "identifier-label", tokenContext: "primitive-detail", typeface: "mono", maxWidth: textMax }));
      g.appendChild(textNode(textX, qrY + q * 0.5, `CODE ${codeToken()}`, { size: 13, tokenSize: "small", tokenFunction: "data", tokenRole: "code-caption", tokenContext: "primitive-detail", typeface: "mono", maxWidth: textMax }));
      g.appendChild(textNode(textX, qrY + q * 0.74, "INPUT VERIFIED / OUTPUT OK", { size: 13, tokenSize: "small", tokenFunction: "sign", tokenRole: "verification", tokenContext: "primitive-detail", typeface: "english", maxWidth: textMax }));
    }

    function renderWaveDetail(g, x, y, w, h) {
      const inset = detailPadding(w, h);
      const waveH = Math.min(62, Math.max(28, h - inset * 2));
      wave(g, x + inset, y + h - inset - waveH, w - inset * 2, waveH);
    }

    function renderTableDetail(g, x, y, w, h) {
      const inset = detailPadding(w, h);
      const maxTableHeight = Math.max(48, h - inset * 2);
      const tableHeight = Math.min(120, maxTableHeight);
      miniTable(g, x + inset, y + h - inset - tableHeight, w - inset * 2, { maxHeight: tableHeight });
    }

    // Extension point: add a detail renderer here, then use its id from a layout.
    const contentDetailModes = [
      { id: "barcode", weight: 34, render: renderBarcodeDetail },
      { id: "pseudo-qr", weight: 16, render: renderPseudoQrDetail },
      { id: "table", weight: 18, render: renderTableDetail },
      { id: "wave", weight: 14, render: renderWaveDetail }
    ];

    function pickContentDetailMode(mode = "mixed") {
      if (mode !== "mixed") {
        return contentDetailModes.find(detail => detail.id === mode) || contentDetailModes[contentDetailModes.length - 1];
      }

      const totalWeight = contentDetailModes.reduce((sum, detail) => sum + detail.weight, 0);
      let cursor = r(0, totalWeight);
      for (const detail of contentDetailModes) {
        cursor -= detail.weight;
        if (cursor <= 0) return detail;
      }
      return contentDetailModes[contentDetailModes.length - 1];
    }

    function renderContentDetail(g, x, y, w, h, mode = "mixed") {
      const detailBox = paddedBox(x, y, w, h, "medium");
      pickContentDetailMode(mode).render(g, detailBox.x, detailBox.y, detailBox.width, detailBox.height);
    }

    function contentPanel(x, y, w, h, mode = "mixed", options = {}) {
      const g = make("g", { opacity: r(0.78, 1) });
      const drawShell = options.shell !== false;
      const zones = contentZones(x, y, w, h);
      const title = pick(visualTokens.englishKeywords);
      const ko = pick(visualTokens.koreanKeywords);
      const org = `${pick(visualTokens.organizationPrefixes)} ${pick(visualTokens.organizationSuffixes)}`;
      const primary = pickPrimaryDisplayTypography();
      const big = primary.value;
      const isCjk = hasHangul(big) || hasHanja(big);
      const isXlarge = primary.size === "xlarge";
      const showBadge = chance(0.56);
      const badgeValue = chance(0.5) ? `V${ri(1, 7)}.${ri(0, 9)}` : `REV ${String.fromCharCode(65 + ri(0, 25))}`;
      const badgeW = microBadgeWidth(badgeValue);
      const textMaxWidth = Math.max(36, zones.box.width);
      const headerPair = showBadge ? smallTokenPairZones(zones.header, badgeW) : null;
      const labelValue = chance(0.5) ? "STATUS" : title;
      const stackAlign = {
        header: showBadge ? "left" : pickTokenAlign("left", 0.55),
        badge: "right",
        label: pickTokenAlign("left", 0.5),
        main: pickTokenAlign("left", 0.58),
        sub: pickTokenAlign("left", 0.5)
      };
      const orgZone = headerPair ? headerPair.left : zones.header;

      if (drawShell && chance(0.42)) g.appendChild(rect(x, y, w, h, { opacity: 0.9 }));

      stackTextToken(g, orgZone, `@${org}`, {
        align: stackAlign.header,
        tokenSize: "small",
        tokenFunction: "content",
        tokenRole: "organization",
        size: Math.max(10, Math.min(15, w / 24, zones.header.height * 0.72)),
        opacity: 0.9,
        typeface: "english",
        spin: spinAngle("subtle", 0.16)
      });
      if (showBadge) {
        microBadge(g, alignedBoxX(headerPair.right, badgeW, stackAlign.badge), headerPair.right.y, badgeValue, { spin: spinAngle("subtle", 0.18) });
      }

      stackTextToken(g, zones.label, labelValue, {
        align: stackAlign.label,
        tokenSize: "medium",
        tokenFunction: labelValue === "STATUS" ? "sign" : "content",
        tokenRole: labelValue === "STATUS" ? "status" : "display-keyword",
        size: Math.max(10, Math.min(14, w / 22, zones.label.height * 0.72)),
        opacity: 0.85,
        typeface: "english",
        spin: spinAngle("subtle", 0.14)
      });
      stackTextToken(g, zones.main, big, {
        align: stackAlign.main,
        tokenSize: primary.size || "large",
        tokenFunction: primary.function,
        tokenRole: primary.role,
        baseline: 0.76,
        size: Math.min(zones.main.height * (isXlarge ? 0.92 : 0.7), isCjk ? zones.main.width * (isXlarge ? 0.5 : 0.2) : zones.main.width * (isXlarge ? 0.56 : 0.22), isXlarge ? 292 : 104),
        minSize: Math.min(isXlarge ? 42 : 22, zones.main.height * (isXlarge ? 0.76 : 0.58)),
        maxWidth: textMaxWidth,
        maxHeight: zones.main.height * 0.92,
        opacity: 0.98,
        typeface: primary.typeface,
        spin: spinAngle("subtle", 0.18)
      });

      if (chance(0.68)) {
        stackTextToken(g, zones.sub, isCjk ? pick(visualTokens.englishKeywords) : ko, {
          align: stackAlign.sub,
          tokenSize: "medium",
          tokenFunction: "content",
          tokenRole: "display-keyword",
          baseline: 0.76,
          size: Math.min(21, w / 10, zones.sub.height * 0.78),
          opacity: 0.92,
          typeface: isCjk ? "english" : "korean",
          maxWidth: textMaxWidth,
          spin: spinAngle("subtle", 0.12)
        });
      }

      renderContentDetail(g, zones.detail.x, zones.detail.y, zones.detail.width, zones.detail.height, mode);

      if (chance(0.32)) {
        const dividerY = zones.detail.y - zones.gap * 0.5;
        g.appendChild(line(zones.box.x, dividerY, zones.box.x + zones.box.width, dividerY, { dash: "7 7", opacity: 0.82 }));
      }
      return g;
    }

    // 3x3 random rectangular block system.
    function shuffled(items) {
      const result = [...items];
      for (let index = result.length - 1; index > 0; index--) {
        const swapIndex = ri(0, index);
        [result[index], result[swapIndex]] = [result[swapIndex], result[index]];
      }
      return result;
    }

    function gridBlockCells(block) {
      const cells = [];
      for (let row = block.row; row < block.row + block.height; row++) {
        for (let column = block.column; column < block.column + block.width; column++) {
          cells.push(row * LAYOUT_GRID.columns + column + 1);
        }
      }
      return cells;
    }

    function footprintFits(occupied, column, row, footprint) {
      if (column + footprint.width > LAYOUT_GRID.columns || row + footprint.height > LAYOUT_GRID.rows) {
        return false;
      }
      for (let y = row; y < row + footprint.height; y++) {
        for (let x = column; x < column + footprint.width; x++) {
          if (occupied[y * LAYOUT_GRID.columns + x]) return false;
        }
      }
      return true;
    }

    function markFootprint(occupied, block, value) {
      gridBlockCells(block).forEach(cellNumber => {
        occupied[cellNumber - 1] = value;
      });
    }

    function isXxxlargeFootprint(block) {
      return (block.width === 3 && block.height === 2) ||
        (block.width === 2 && block.height === 3);
    }

    function isCenteredXxlargeFootprint(block) {
      return (block.width === 3 && block.height === 1) ||
        (block.width === 1 && block.height === 3);
    }

    function blockTypographyRotation(block) {
      return isCenteredXxlargeFootprint(block) && block.height > block.width ? 90 : 0;
    }

    function orientedTypographyDimensions(item, rotation = 0) {
      const width = estimateTextWidth(item.value, item.intrinsic.fontSize);
      const height = estimateTextHeight(item.value, item.intrinsic.fontSize);
      return rotation === 90 ? { width: height, height: width } : { width, height };
    }

    function footprintSupportsRequiredTypography(box, footprint) {
      const items = isXxxlargeFootprint(footprint)
        ? xxxlargeTypographyTokens()
        : isCenteredXxlargeFootprint(footprint)
          ? xxlargeTypographyTokens()
          : null;
      if (!items) return true;
      const availableWidth = box.width * footprint.width / LAYOUT_GRID.columns;
      const availableHeight = box.height * footprint.height / LAYOUT_GRID.rows;
      const rotation = blockTypographyRotation(footprint);
      const fittingItems = items.filter(item => {
        const dimensions = orientedTypographyDimensions(item, rotation);
        return dimensions.width <= availableWidth && dimensions.height <= availableHeight;
      });
      return fittingItems.length >= (isCenteredXxlargeFootprint(footprint) ? 2 : 1);
    }

    function buildGridBlockLayout(targetCount, footprints = GRID_BLOCK_FOOTPRINTS) {
      const occupied = Array(LAYOUT_GRID.columns * LAYOUT_GRID.rows).fill(false);
      const blocks = [];

      function search(blocksLeft) {
        const firstOpenIndex = occupied.indexOf(false);
        if (firstOpenIndex === -1) return blocksLeft === 0;
        if (blocksLeft === 0) return false;

        const remainingCells = occupied.filter(value => !value).length;
        if (remainingCells < blocksLeft || remainingCells > blocksLeft * 6) return false;

        const column = firstOpenIndex % LAYOUT_GRID.columns;
        const row = Math.floor(firstOpenIndex / LAYOUT_GRID.columns);
        const idealArea = remainingCells / blocksLeft;
        const candidates = shuffled(footprints)
          .filter(footprint => footprintFits(occupied, column, row, footprint))
          .map(footprint => ({
            ...footprint,
            score: Math.abs(footprint.width * footprint.height - idealArea) + random() * 2.25
          }))
          .sort((a, b) => a.score - b.score);

        for (const footprint of candidates) {
          const block = {
            column,
            row,
            width: footprint.width,
            height: footprint.height,
            area: footprint.width * footprint.height
          };
          const remainingAfter = remainingCells - block.area;
          if (remainingAfter < blocksLeft - 1 || remainingAfter > (blocksLeft - 1) * 6) continue;

          markFootprint(occupied, block, true);
          blocks.push(block);
          if (search(blocksLeft - 1)) return blocks;
          blocks.pop();
          markFootprint(occupied, block, false);
        }
        return null;
      }

      return search(targetCount);
    }

    function randomGridBlocks(box) {
      const availableFootprints = GRID_BLOCK_FOOTPRINTS.filter(footprint =>
        footprintSupportsRequiredTypography(box, footprint)
      );
      const preferredCount = pick([2, 3, 3, 4, 4, 5]);
      const countOptions = [preferredCount, ...shuffled([2, 3, 4, 5].filter(count => count !== preferredCount))];
      let blocks = null;
      for (const count of countOptions) {
        blocks = buildGridBlockLayout(count, availableFootprints);
        if (blocks) break;
      }
      blocks ||= buildGridBlockLayout(3, availableFootprints);
      const secondaryKinds = ["content", "data", "sign", "graphic"];
      const primaryCandidates = blocks.filter(block => block.area >= 2);
      let primaryBlock = null;

      if (primaryCandidates.length && chance(GRID_PRIMARY_CHANCE)) {
        const largestArea = Math.max(...primaryCandidates.map(block => block.area));
        primaryBlock = pick(primaryCandidates.filter(block => block.area === largestArea));
      }

      return blocks.map((block, index) => ({
        ...block,
        id: `block-${index + 1}`,
        kind: block === primaryBlock ? "primary" : pick(secondaryKinds),
        cells: gridBlockCells(block)
      }));
    }

    function gridMetrics(box) {
      const gap = 0;
      return {
        gap,
        columnWidth: (box.width - gap * (LAYOUT_GRID.columns - 1)) / LAYOUT_GRID.columns,
        rowHeight: (box.height - gap * (LAYOUT_GRID.rows - 1)) / LAYOUT_GRID.rows
      };
    }

    function gridBlockBox(box, block) {
      const metrics = gridMetrics(box);
      return {
        x: box.x + block.column * (metrics.columnWidth + metrics.gap),
        y: box.y + block.row * (metrics.rowHeight + metrics.gap),
        width: metrics.columnWidth * block.width + metrics.gap * (block.width - 1),
        height: metrics.rowHeight * block.height + metrics.gap * (block.height - 1)
      };
    }

    function blockContentBox(box, block) {
      const inset = isXxxlargeFootprint(block) || isCenteredXxlargeFootprint(block) ? 0 : Math.min(
        marginSize(box.width, box.height, "small"),
        box.width * 0.12,
        box.height * 0.12
      );
      return {
        x: box.x + inset,
        y: box.y + inset,
        width: Math.max(1, box.width - inset * 2),
        height: Math.max(1, box.height - inset * 2)
      };
    }

    function blockHorizontalAlignment(block) {
      if (isXxxlargeFootprint(block)) return "center";
      if (isCenteredXxlargeFootprint(block)) return "center";
      if (block.width === LAYOUT_GRID.columns) return "center";
      if (block.column === 0) return "left";
      if (block.column + block.width === LAYOUT_GRID.columns) return "right";
      return "center";
    }

    function blockVerticalAlignment(block) {
      if (isXxxlargeFootprint(block)) return "middle";
      if (isCenteredXxlargeFootprint(block)) return "middle";
      if (block.height === LAYOUT_GRID.rows) return "middle";
      if (block.row === 0) return "top";
      if (block.row + block.height === LAYOUT_GRID.rows) return "bottom";
      return "middle";
    }

    function layoutGridBlockPosition(box, block) {
      const align = blockHorizontalAlignment(block);
      const verticalAlign = blockVerticalAlignment(block);
      const horizontalAnchorRatio = { left: 0, center: 0.5, right: 1 }[align];
      const verticalAnchorRatio = { top: 0, middle: 0.5, bottom: 1 }[verticalAlign];
      return {
        x: box.x + box.width * horizontalAnchorRatio,
        y: box.y + box.height * verticalAnchorRatio,
        align,
        verticalAlign,
        rotation: blockTypographyRotation(block)
      };
    }

    function alignedBoxY(position, tokenHeight) {
      const alignOffset = { top: 0, middle: 0.5, bottom: 1 }[position.verticalAlign];
      return position.y - tokenHeight * alignOffset;
    }

    function gridTokenPools() {
      const typography = Object.values(tokenGalleryItems()).flat();
      return {
        primary: typography.filter(item => item.function === "content" && ["large", "xlarge", "xxlarge"].includes(item.size)),
        xxlargeBlock: typography.filter(item => item.size === "xxlarge"),
        xxxlargeBlock: typography.filter(item => item.size === "xxxlarge"),
        content: typography.filter(item => item.function === "content" && ["small", "medium"].includes(item.size)),
        data: typography.filter(item => item.function === "data" && ["small", "medium"].includes(item.size)),
        sign: typography.filter(item => item.function === "sign" && ["small", "medium"].includes(item.size)),
        graphic: graphicTokenGalleryItems().filter(item => item.function === "data")
      };
    }

    function gridTokenIntrinsicBox(position, item) {
      if (item.intrinsic.width && item.intrinsic.height) {
        return intrinsicTokenBox(position, item.intrinsic);
      }
      const fontSize = item.intrinsic.fontSize;
      const dimensions = orientedTypographyDimensions(item, position.rotation);
      const width = dimensions.width;
      const height = dimensions.height;
      const alignOffset = { left: 0, center: 0.5, right: 1 }[position.align];
      return {
        x: position.x - width * alignOffset,
        y: alignedBoxY(position, height),
        width,
        height
      };
    }

    function gridTokenFits(bounds, availableBox) {
      return bounds.x >= availableBox.x &&
        bounds.y >= availableBox.y &&
        bounds.x + bounds.width <= availableBox.x + availableBox.width &&
        bounds.y + bounds.height <= availableBox.y + availableBox.height;
    }

    function typographyWordKey(item) {
      if (typeof item?.value !== "string") return null;
      return item.value.normalize("NFKC").trim().replace(/\s+/g, " ").toUpperCase();
    }

    function isUnusedTypographyWord(item, usedTypographyWords) {
      const key = typographyWordKey(item);
      return !key || !usedTypographyWords.has(key);
    }

    function blockCandidateGroups(kind, block, candidates) {
      if (kind === "primary") {
        const preferredSizes = block.area >= 6
          ? ["xxlarge", "xlarge", "large"]
          : block.area >= 3
            ? ["xlarge", "large"]
            : ["large"];
        return [
          ...preferredSizes.map(size => candidates.filter(item => item.size === size)),
          candidates.filter(item => !preferredSizes.includes(item.size))
        ].filter(group => group.length);
      }

      const preferredSize = kind === "graphic"
        ? (block.area >= 2 ? "large" : "medium")
        : (block.area >= 2 ? "medium" : "small");
      return [
        candidates.filter(item => item.size === preferredSize),
        candidates.filter(item => item.size !== preferredSize)
      ].filter(group => group.length);
    }

    function pickGridTokenItem(block, position, pools, availableBox, usedUniqueRoles, usedTypographyWords) {
      if (isXxxlargeFootprint(block)) {
        const candidates = shuffled(pools.xxxlargeBlock.filter(item => isUnusedTypographyWord(item, usedTypographyWords)));
        while (candidates.length) {
          const item = candidates.pop();
          const bounds = gridTokenIntrinsicBox(position, item);
          if (gridTokenFits(bounds, availableBox)) return { item, bounds, kind: "block-xxxlarge" };
        }
        return null;
      }

      if (isCenteredXxlargeFootprint(block)) {
        const candidates = shuffled(pools.xxlargeBlock.filter(item => isUnusedTypographyWord(item, usedTypographyWords)));
        while (candidates.length) {
          const item = candidates.pop();
          const bounds = gridTokenIntrinsicBox(position, item);
          if (gridTokenFits(bounds, availableBox)) return { item, bounds, kind: "block-xxlarge" };
        }
        return null;
      }

      const secondaryKinds = ["content", "data", "sign", "graphic"];
      const kindOrder = block.kind === "primary"
        ? ["primary", ...shuffled(secondaryKinds)]
        : [block.kind, ...shuffled(secondaryKinds.filter(kind => kind !== block.kind))];

      for (const kind of kindOrder) {
        const candidates = pools[kind].filter(item =>
          (!UNIQUE_GRID_TOKEN_ROLES.includes(item.role) || !usedUniqueRoles.has(item.role)) &&
          isUnusedTypographyWord(item, usedTypographyWords)
        );
        for (const sourceGroup of blockCandidateGroups(kind, block, candidates)) {
          const group = shuffled(sourceGroup);
          while (group.length) {
            const item = group.pop();
            const bounds = gridTokenIntrinsicBox(position, item);
            if (gridTokenFits(bounds, availableBox)) return { item, bounds, kind };
          }
        }
      }
      return null;
    }

    function renderGridBlockToken(g, position, kind, item) {
      const token = make("g", {
        "data-grid-token": item.role,
        "data-grid-token-kind": kind,
        "data-token-placement": "position-only",
        "data-token-scale": "1",
        "data-token-rotation": position.rotation || 0,
        ...(kind === "graphic" ? tokenSizeAttrs(item.size) : {}),
        ...(kind === "graphic" ? tokenTaxonomyAttrs({
          form: "graphic",
          tokenFunction: item.function,
          role: item.role,
          context: "component"
        }) : {})
      });
      if (kind === "graphic") {
        token.setAttribute("data-token-intrinsic-width", item.intrinsic.width);
        token.setAttribute("data-token-intrinsic-height", item.intrinsic.height);
        item.renderAt(token, position, "component");
      } else {
        const fontSize = item.intrinsic.fontSize;
        const textHeight = estimateTextHeight(item.value, fontSize);
        const baselineY = alignedBoxY(position, textHeight) + textHeight * 0.5 + fontSize * 0.34;
        token.setAttribute("data-token-intrinsic-font-size", fontSize);
        token.appendChild(textNode(position.x, baselineY, item.value, {
          align: position.align,
          tokenSize: item.size,
          tokenFunction: item.function,
          tokenRole: item.role,
          tokenContext: "component",
          size: fontSize,
          typeface: item.typeface,
          transform: position.rotation ? `rotate(${position.rotation} ${position.x} ${position.y})` : ""
        }));
      }
      g.appendChild(token);
    }

    function renderRandomGridLayout(w, h) {
      const g = make("g", {
        "data-layout-mode": "random-blocks",
        "data-grid-columns": LAYOUT_GRID.columns,
        "data-grid-rows": LAYOUT_GRID.rows
      });
      const safe = paddedBox(0, 0, w, h, "large");
      const pools = gridTokenPools();
      const usedUniqueRoles = new Set();
      const usedTypographyWords = new Set();
      const blocks = randomGridBlocks(safe);
      activeBlockLayout = blocks.map(block => `${block.width}x${block.height}`).join("+");

      blocks.forEach(block => {
        const box = gridBlockBox(safe, block);
        const contentBox = blockContentBox(box, block);
        const position = layoutGridBlockPosition(contentBox, block);
        const selection = pickGridTokenItem(block, position, pools, contentBox, usedUniqueRoles, usedTypographyWords);
        const group = make("g", {
          "data-grid-block": block.id,
          "data-grid-footprint": `${block.width}x${block.height}`,
          "data-grid-block-area": block.area,
          "data-grid-origin": `${block.column}:${block.row}`,
          "data-grid-column": block.column,
          "data-grid-row": block.row,
          "data-grid-column-span": block.width,
          "data-grid-row-span": block.height,
          "data-grid-cells": block.cells.join(","),
          "data-grid-block-x": box.x,
          "data-grid-block-y": box.y,
          "data-grid-block-width": box.width,
          "data-grid-block-height": box.height,
          "data-grid-position-x": position.x,
          "data-grid-position-y": position.y,
          "data-grid-alignment": position.align,
          "data-grid-vertical-alignment": position.verticalAlign,
          "data-grid-token-rotation": position.rotation,
          "data-grid-block-empty": selection ? "false" : "true"
        });

        const outline = rect(box.x, box.y, box.width, box.height, { opacity: blockOutlinesVisible ? 0.18 : 0 });
        outline.setAttribute("data-grid-block-outline", block.id);
        group.appendChild(outline);

        if (selection) {
          renderGridBlockToken(group, position, selection.kind, selection.item);
          if (UNIQUE_GRID_TOKEN_ROLES.includes(selection.item.role)) {
            usedUniqueRoles.add(selection.item.role);
          }
          const wordKey = typographyWordKey(selection.item);
          if (wordKey) usedTypographyWords.add(wordKey);
        }
        g.appendChild(group);
      });
      return g;
    }

    function tokenGalleryItems() {
      const orgs = visualTokens.organizationPrefixes.map((prefix, index) => {
        const suffix = visualTokens.organizationSuffixes[index % visualTokens.organizationSuffixes.length];
        return typographyToken(`@${prefix} ${suffix}`, { typeface: "english", size: "small", function: "content", role: "organization" });
      });
      const tableTokens = visualTokens.tableFieldLabels.map((labelName, index) => typographyToken(`${labelName} ${index % 3 === 0 ? ri(10, 99) : index % 3 === 1 ? `${ri(1, 99)}%` : codeToken()}`, { typeface: "mono", size: "small", function: "data", role: "table-cell" }));

    function intrinsicTokenBox(position, intrinsic) {
      const alignOffset = { left: 0, center: 0.5, right: 1 }[position.align];
      return {
        x: position.x - intrinsic.width * alignOffset,
        y: alignedBoxY(position, intrinsic.height),
        width: intrinsic.width,
        height: intrinsic.height
      };
    }

    function graphicTokenGalleryItems() {
      const sizedGraphic = base => {
        const size = pick(GRAPHIC_TOKEN_SIZES);
        const scale = GRAPHIC_SIZE_SCALE[size];
        return {
          size,
          intrinsic: {
            width: base.width * scale,
            height: base.height * scale
          }
        };
      };
      const barcodeToken = sizedGraphic({ width: 96, height: 38 });
      const tableToken = sizedGraphic({ width: 96, height: 48 });
      const waveToken = sizedGraphic({ width: 84, height: 42 });
      const pseudoQrToken = sizedGraphic({ width: 48, height: 48 });

          function: "data",
          role: "barcode",
          size: barcodeToken.size,
          intrinsic: barcodeToken.intrinsic,

          renderAt: (g, position, tokenContext = "component") => {
            const box = intrinsicTokenBox(position, tableToken.intrinsic);
            miniTable(g, box.x, box.y, box.width, { maxHeight: box.height, tokenSize: tableToken.size, tokenContext });
          }
        },
        {
          function: "data",
          role: "wave",
          size: waveToken.size,
          intrinsic: waveToken.intrinsic,
          render: (g, cell, tokenContext = "catalog-ui") => wave(g, cell.x, cell.y + cell.height * 0.14, cell.width, cell.height * 0.66, { tokenSize: waveToken.size, tokenContext }),
          renderAt: (g, position, tokenContext = "component") => {
            const box = intrinsicTokenBox(position, waveToken.intrinsic);
            wave(g, box.x, box.y, box.width, box.height, { tokenSize: waveToken.size, tokenContext });
          }

          function: "data",

          renderAt: (g, position, tokenContext = "component") => {

          renderAt: (g, position, tokenContext = "component") => {

    function isComposableToken(item) {
      return COMPOSABLE_TOKEN_FUNCTIONS.includes(item.function);
    }

    function tokenCategoryDefinitions() {
      const typography = Object.values(tokenGalleryItems()).flat();
      const graphics = graphicTokenGalleryItems();
      return [
        { id: "typography-content", label: "TYPOGRAPHY / CONTENT", shortLabel: "TYPE CONTENT", form: "typography", function: "content", items: typography.filter(item => item.function === "content") },
        { id: "typography-data", label: "TYPOGRAPHY / DATA", shortLabel: "TYPE DATA", form: "typography", function: "data", items: typography.filter(item => item.function === "data") },
        { id: "typography-symbol", label: "TYPOGRAPHY / SYMBOL", shortLabel: "TYPE SYMBOL", form: "typography", function: "symbol", items: typography.filter(item => item.function === "symbol") },
        { id: "typography-sign", label: "TYPOGRAPHY / SIGN", shortLabel: "TYPE SIGN", form: "typography", function: "sign", items: typography.filter(item => item.function === "sign") },
        { id: "graphic-content", label: "GRAPHIC / CONTENT", shortLabel: "GRAPHIC CONTENT", form: "graphic", function: "content", items: graphics.filter(item => item.function === "content") },
        { id: "graphic-data", label: "GRAPHIC / DATA", shortLabel: "GRAPHIC DATA", form: "graphic", function: "data", items: graphics.filter(item => item.function === "data") },
        { id: "graphic-symbol", label: "GRAPHIC / SYMBOL", shortLabel: "GRAPHIC SYMBOL", form: "graphic", function: "symbol", items: graphics.filter(item => item.function === "symbol") },
        { id: "graphic-sign", label: "GRAPHIC / SIGN", shortLabel: "GRAPHIC SIGN", form: "graphic", function: "sign", items: graphics.filter(item => item.function === "sign") }
      ];
    }

    function composableTokenCategories(definitions = tokenCategoryDefinitions()) {
      return definitions.filter(category => isComposableToken(category) && category.items.length);
    }

    function composableCategoryCombinations(categories) {
      const combinations = [];
      const total = 1 << categories.length;
      for (let mask = 0; mask < total; mask++) {
        const combination = categories.filter((category, index) => mask & (1 << index));
        if (combination.length >= 2) combinations.push(combination);
      }
      return combinations.sort((a, b) => a.length - b.length);
    }

    function renderComposableCategorySample(g, category, cell) {
      const item = pick(category.items);
      const labelH = cell.height < 48 ? 0 : 18;
      if (labelH) {
        g.appendChild(textNode(cell.x, cell.y + 10, category.shortLabel, { size: 8, tokenSize: "small", tokenFunction: "content", tokenRole: "catalog-sample-label", tokenContext: "catalog-ui", typeface: "english", opacity: 0.55, maxWidth: cell.width }));
      }

      const sample = {
        x: cell.x,
        y: cell.y + labelH,
        width: cell.width,
        height: Math.max(1, cell.height - labelH)
      };
      if (category.form === "graphic") {
        item.render(g, sample);
        return;
      }

      const sizeLimit = Math.max(9, sample.height * 0.58);
      const sizes = { small: Math.min(11, sizeLimit), medium: Math.min(16, sizeLimit), large: Math.min(22, sizeLimit), xlarge: Math.min(30, sizeLimit), xxlarge: Math.min(38, sizeLimit), xxxlarge: Math.min(46, sizeLimit) };
      stackTextToken(g, sample, item.value, {
        align: "left",
        tokenSize: item.size,
        tokenFunction: item.function,
        tokenRole: item.role,
        tokenContext: "catalog-ui",
        baseline: 0.62,
        size: sizes[item.size] || 16,
        minSize: 8,
        maxHeight: sample.height * 0.82,
        typeface: item.typeface,
        maxWidth: sample.width
      });
    }

    function renderTokenMap(g, box, definitions) {
      const titleH = TOKEN_CATALOG_SECTION_TITLE.height;
      const rowLabelW = Math.min(118, box.width * 0.16);
      const gridY = box.y + titleH;
      const gridH = box.height - titleH;
      const cellW = (box.width - rowLabelW) / TOKEN_FUNCTIONS.length;
      const cellH = gridH / TOKEN_FORMS.length;

      g.appendChild(textNode(box.x, box.y + titleH * 0.72, "TOKEN MAP", { size: TOKEN_CATALOG_SECTION_TITLE.size, tokenSize: "small", tokenFunction: "content", tokenRole: "catalog-section-label", tokenContext: "catalog-ui", typeface: "english", maxWidth: box.width * 0.5 }));
      g.appendChild(textNode(box.x + box.width, box.y + titleH * 0.72, "COMPOSE  /  EMPTY  /  SIGN", { size: 8, tokenSize: "small", tokenFunction: "data", tokenRole: "catalog-map-legend", tokenContext: "catalog-ui", align: "right", typeface: "mono", opacity: 0.62, maxWidth: box.width * 0.42 }));
      g.appendChild(line(box.x, gridY, box.x + box.width, gridY, { opacity: 0.75 }));

      TOKEN_FUNCTIONS.forEach((tokenFunction, column) => {
        const x = box.x + rowLabelW + column * cellW;
        g.appendChild(textNode(x + cellW * 0.5, gridY + 13, tokenFunction.toUpperCase(), { size: 8, tokenSize: "small", tokenFunction: "content", tokenRole: "catalog-map-column", tokenContext: "catalog-ui", align: "center", typeface: "english", maxWidth: cellW * 0.86 }));
      });

      TOKEN_FORMS.forEach((form, row) => {
        const y = gridY + row * cellH;
        g.appendChild(textNode(box.x, y + cellH * 0.6, form.toUpperCase(), { size: 9, tokenSize: "small", tokenFunction: "content", tokenRole: "catalog-map-row", tokenContext: "catalog-ui", typeface: "english", maxWidth: rowLabelW * 0.86 }));
        g.appendChild(line(box.x, y + cellH, box.x + box.width, y + cellH, { opacity: 0.3 }));

        TOKEN_FUNCTIONS.forEach((tokenFunction, column) => {
          const category = definitions.find(item => item.form === form && item.function === tokenFunction);
          const x = box.x + rowLabelW + column * cellW;
          const status = tokenFunction === "sign" ? "SIGN" : category.items.length ? "COMPOSE" : "EMPTY";
          const active = status === "COMPOSE";
          g.appendChild(rect(x + 2, y + cellH * 0.43, 5, 5, { fill: active ? "currentColor" : "none", opacity: active ? 0.9 : 0.45 }));
          g.appendChild(textNode(x + 12, y + cellH * 0.6, `${category.items.length}  ${status}`, { size: 8, tokenSize: "small", tokenFunction: "data", tokenRole: "catalog-map-cell", tokenContext: "catalog-ui", typeface: "mono", opacity: active ? 0.9 : 0.48, maxWidth: cellW - 16 }));
          if (column) g.appendChild(line(x, y + 18, x, y + cellH, { opacity: 0.22 }));
        });
      });
    }

    function renderCompositionRuleGroups(g, box) {
      const titleH = TOKEN_CATALOG_SECTION_TITLE.height;
      const gap = marginSize(box.width, box.height, "medium");
      const groupW = (box.width - gap * (COMPOSITION_RULE_GROUPS.length - 1)) / COMPOSITION_RULE_GROUPS.length;
      g.appendChild(textNode(box.x, box.y + titleH * 0.72, "RULE GROUPS", { size: TOKEN_CATALOG_SECTION_TITLE.size, tokenSize: "small", tokenFunction: "content", tokenRole: "catalog-section-label", tokenContext: "catalog-ui", typeface: "english", maxWidth: box.width }));
      g.appendChild(line(box.x, box.y + titleH, box.x + box.width, box.y + titleH, { opacity: 0.75 }));

      COMPOSITION_RULE_GROUPS.forEach((group, index) => {
        const x = box.x + index * (groupW + gap);
        const bodyY = box.y + titleH;
        const lineH = Math.max(8, (box.height - titleH - 12) / group.rules.length);
        g.appendChild(textNode(x, bodyY + 11, group.label, { size: 8, tokenSize: "small", tokenFunction: "content", tokenRole: "catalog-rule-group", tokenContext: "catalog-ui", typeface: "english", maxWidth: groupW }));
        group.rules.forEach((rule, ruleIndex) => {
          g.appendChild(textNode(x, bodyY + 11 + lineH * (ruleIndex + 1), rule, { size: 7.2, tokenSize: "small", tokenFunction: "content", tokenRole: "catalog-rule", tokenContext: "catalog-ui", typeface: "english", opacity: 0.72, maxWidth: groupW }));

    function renderComposableTokensMode(w, h) {
      const g = make("g", { "data-mode": "composable-tokens" });
      const safe = paddedBox(0, 0, w, h, "large");
      const headerH = 52;
      const sectionGap = marginSize(safe.width, safe.height, "large");
      const definitions = tokenCategoryDefinitions();
      const categories = composableTokenCategories(definitions);
      const combinations = composableCategoryCombinations(categories);

      g.appendChild(textNode(safe.x, safe.y + 26, "COMPOSABLE CATEGORIES", { size: 18, tokenSize: "medium", tokenFunction: "content", tokenRole: "catalog-title", tokenContext: "catalog-ui", typeface: "english", maxWidth: safe.width * 0.58 }));
      g.appendChild(textNode(safe.x + safe.width, safe.y + 26, `CATEGORIES ${categories.length} / COMBINATIONS ${combinations.length}`, { size: 12, tokenSize: "small", tokenFunction: "data", tokenRole: "catalog-count", tokenContext: "catalog-ui", align: "right", typeface: "mono", maxWidth: safe.width * 0.38 }));
      g.appendChild(line(safe.x, safe.y + headerH, safe.x + safe.width, safe.y + headerH, { opacity: 0.85 }));

      const mapY = safe.y + headerH + sectionGap;
      const mapH = Math.max(112, Math.min(150, safe.height * 0.22));
      renderTokenMap(g, { x: safe.x, y: mapY, width: safe.width, height: mapH }, definitions);

      const rulesY = mapY + mapH + sectionGap;
      const rulesH = Math.max(82, Math.min(104, safe.height * 0.15));
      renderCompositionRuleGroups(g, { x: safe.x, y: rulesY, width: safe.width, height: rulesH });

      const listY = rulesY + rulesH + sectionGap;
      const listTitleH = TOKEN_CATALOG_SECTION_TITLE.height;
      const listBottom = safe.y + safe.height;
      const rowsY = listY + listTitleH;
      const rowH = Math.max(44, (listBottom - rowsY) / Math.max(1, combinations.length));
      g.appendChild(textNode(safe.x, listY + listTitleH * 0.72, "POSSIBLE COMBINATIONS", { size: TOKEN_CATALOG_SECTION_TITLE.size, tokenSize: "small", tokenFunction: "content", tokenRole: "catalog-section-label", tokenContext: "catalog-ui", typeface: "english", maxWidth: safe.width }));
      g.appendChild(line(safe.x, rowsY, safe.x + safe.width, rowsY, { opacity: 0.75 }));

      combinations.forEach((combination, rowIndex) => {
        const rowY = rowsY + rowIndex * rowH;
        const labelWidth = safe.width * 0.38;
        const sampleGap = marginSize(safe.width, rowH, "medium");
        const sampleX = safe.x + labelWidth + sampleGap;
        const sampleWidth = safe.width - labelWidth - sampleGap;
        const cellGap = marginSize(sampleWidth, rowH, "small");
        const cellW = (sampleWidth - cellGap * Math.max(0, combination.length - 1)) / combination.length;

        g.appendChild(textNode(safe.x, rowY + rowH * 0.54, combination.map(category => category.shortLabel).join(" + "), { size: 11, tokenSize: "small", tokenFunction: "content", tokenRole: "catalog-combination", tokenContext: "catalog-ui", typeface: "english", maxWidth: labelWidth - sampleGap }));
        combination.forEach((category, index) => {

            x: sampleX + index * (cellW + cellGap),
            y: rowY + 8,
            width: cellW,
            height: Math.max(1, rowH - 16)
          });
        });
        g.appendChild(line(safe.x, rowY + rowH, safe.x + safe.width, rowY + rowH, { opacity: 0.35 }));
      });

      return g;

    function renderComponentBorder(w, h, mode) {
      const g = make("g", { "data-border": mode });
      if (mode === "no-stroke") return g;

      if (mode === "stroke") {
        g.appendChild(rect(1, 1, w - 2, h - 2, { opacity: 0.9 }));
        return g;
      }

      const inset = 8;
      const x0 = inset;
      const y0 = inset;
      const x1 = w - inset;
      const y1 = h - inset;
      const length = Math.min(72, Math.max(38, Math.min(w, h) * 0.18));
      const attrs = { opacity: 0.94 };
      g.append(
        line(x0, y0, x0 + length, y0, attrs),
        line(x0, y0, x0, y0 + length, attrs),
        line(x1, y0, x1 - length, y0, attrs),
        line(x1, y0, x1, y0 + length, attrs),
        line(x0, y1, x0 + length, y1, attrs),
        line(x0, y1, x0, y1 - length, attrs),
        line(x1, y1, x1 - length, y1, attrs),
        line(x1, y1, x1, y1 - length, attrs)
      );
      return g;
    }

    function renderComponent(boardW, boardH) {
      const component = pick(componentTemplates);
      const borderMode = pick(componentBorderModes);
      activeComponentRatio = component.label.replace("component ", "");
      activeBorderMode = borderMode;
      const box = fitComponentBox(boardW, boardH, component.ratio, component.scale);
      const layer = make("svg", {
        x: box.x,
        y: box.y,
        width: box.width,
        height: box.height,
        viewBox: `0 0 ${box.width} ${box.height}`,
        overflow: "hidden",
        "data-component": component.label,
        "data-layout-grid": `${LAYOUT_GRID.columns}x${LAYOUT_GRID.rows}`
      });
      const layout = renderRandomGridLayout(box.width, box.height);
      layer.appendChild(layout);
      layer.appendChild(renderComponentBorder(box.width, box.height, borderMode));
      return layer;
    }

    function validateRenderedTokenRules() {
      const violations = [];
      const classified = [...art.querySelectorAll("[data-token-form]")];
      const unclassified = [...art.querySelectorAll("[data-token-size]")]
        .filter(node => !node.hasAttribute("data-token-form"));
      if (unclassified.length) violations.push(`unclassified:${unclassified.length}`);

      const typographyWithoutTypeface = classified.filter(node =>
        node.getAttribute("data-token-form") === "typography" &&
        !node.hasAttribute("data-token-typeface")
      );
      if (typographyWithoutTypeface.length) {
        violations.push(`typography-without-typeface:${typographyWithoutTypeface.length}`);
      }

      const typographyWithInvalidWeight = classified.filter(node => {
        if (node.getAttribute("data-token-form") !== "typography") return false;
        const expectedWeight = fontWeightForToken(
          node.getAttribute("data-token-size"),
          node.getAttribute("data-token-function")
        );
        return node.getAttribute("data-token-weight") !== expectedWeight ||
          node.getAttribute("font-weight") !== String(FONT_WEIGHTS[expectedWeight]);
      });
      if (typographyWithInvalidWeight.length) {
        violations.push(`typography-invalid-weight:${typographyWithInvalidWeight.length}`);
      }

      const activeStrokes = [...art.querySelectorAll('[stroke]:not([stroke="none"])')];
      const invalidStrokes = activeStrokes.filter(node => {
        const weight = node.getAttribute("data-stroke-weight");
        return !ACTIVE_STROKE_WEIGHTS.includes(weight) ||
          node.getAttribute("stroke-width") !== String(STROKE_WEIGHTS[weight]);
      });
      if (invalidStrokes.length) {
        violations.push(`invalid-stroke-weight:${invalidStrokes.length}`);
      }

      const component = art.querySelector("svg[data-component]");
      if (component) {
        const layout = component.querySelector('[data-layout-mode="random-blocks"]');
        const gridBlocks = [...component.querySelectorAll("[data-grid-block]")];
        const allowedFootprints = new Set(GRID_BLOCK_FOOTPRINTS.map(footprint => `${footprint.width}x${footprint.height}`));
        const allBlockCells = gridBlocks.flatMap(block =>
          (block.getAttribute("data-grid-cells") || "").split(",").filter(Boolean).map(Number)
        );
        const blocksWithInvalidTokenCount = gridBlocks.filter(block =>
          [...block.children].filter(child => child.hasAttribute("data-grid-token")).length !== 1
        );
        const blocksWithInvalidEmptyState = gridBlocks.filter(block => {
          const tokenCount = [...block.children].filter(child => child.hasAttribute("data-grid-token")).length;
          return block.getAttribute("data-grid-block-empty") !== String(tokenCount === 0);
        });
        const blocksWithInvalidPosition = gridBlocks.filter(block =>
          !Number.isFinite(Number(block.getAttribute("data-grid-position-x"))) ||
          !Number.isFinite(Number(block.getAttribute("data-grid-position-y"))) ||
          !TOKEN_ALIGNMENTS.includes(block.getAttribute("data-grid-alignment")) ||
          !TOKEN_VERTICAL_ALIGNMENTS.includes(block.getAttribute("data-grid-vertical-alignment"))
        );
        const blocksWithInvalidFootprint = gridBlocks.filter(block => {
          const column = Number(block.getAttribute("data-grid-column"));
          const row = Number(block.getAttribute("data-grid-row"));
          const width = Number(block.getAttribute("data-grid-column-span"));
          const height = Number(block.getAttribute("data-grid-row-span"));
          const footprint = `${width}x${height}`;
          const expectedBlock = { column, row, width, height };
          const expectedCells = gridBlockCells(expectedBlock).join(",");
          return !allowedFootprints.has(footprint) ||
            block.getAttribute("data-grid-footprint") !== footprint ||
            block.getAttribute("data-grid-block-area") !== String(width * height) ||
            block.getAttribute("data-grid-origin") !== `${column}:${row}` ||
            column < 0 || row < 0 ||
            column + width > LAYOUT_GRID.columns ||
            row + height > LAYOUT_GRID.rows ||
            block.getAttribute("data-grid-cells") !== expectedCells ||
            block.getAttribute("data-grid-alignment") !== blockHorizontalAlignment(expectedBlock) ||
            block.getAttribute("data-grid-vertical-alignment") !== blockVerticalAlignment(expectedBlock) ||
            block.getAttribute("data-grid-token-rotation") !== String(blockTypographyRotation(expectedBlock)) ||
            block.querySelectorAll(":scope > [data-grid-block-outline]").length !== 1;
        });
        const xxxlargeFootprintBlocksWithInvalidToken = gridBlocks.filter(block => {
          if (!["2x3", "3x2"].includes(block.getAttribute("data-grid-footprint"))) return false;
          const token = block.querySelector(":scope > [data-grid-token]");
          const typography = token?.querySelector(':scope > text[data-token-form="typography"]');
          return block.getAttribute("data-grid-alignment") !== "center" ||
            block.getAttribute("data-grid-vertical-alignment") !== "middle" ||
            !token ||
            token.getAttribute("data-grid-token-kind") !== "block-xxxlarge" ||
            !typography ||
            typography.getAttribute("data-token-size") !== "xxxlarge" ||
            typography.getAttribute("font-size") !== "256";
        });
        const centeredXxlargeFootprintBlocksWithInvalidToken = gridBlocks.filter(block => {
          if (!["1x3", "3x1"].includes(block.getAttribute("data-grid-footprint"))) return false;
          const token = block.querySelector(":scope > [data-grid-token]");
          const typography = token?.querySelector(':scope > text[data-token-form="typography"]');
          const expectedRotation = block.getAttribute("data-grid-footprint") === "1x3" ? "90" : "0";
          return block.getAttribute("data-grid-alignment") !== "center" ||
            block.getAttribute("data-grid-vertical-alignment") !== "middle" ||
            block.getAttribute("data-grid-token-rotation") !== expectedRotation ||
            !token ||
            token.getAttribute("data-grid-token-kind") !== "block-xxlarge" ||
            token.getAttribute("data-token-rotation") !== expectedRotation ||
            !typography ||
            typography.getAttribute("data-token-size") !== "xxlarge" ||
            typography.getAttribute("font-size") !== "128" ||
            (expectedRotation === "90" && !(typography.getAttribute("transform") || "").startsWith("rotate(90 "));
        });
        const tokensWithInvalidPlacement = [...component.querySelectorAll("[data-grid-token]")].filter(token =>
          token.getAttribute("data-token-placement") !== "position-only" ||
          token.getAttribute("data-token-scale") !== "1" ||
          (token.getAttribute("transform") || "").includes("scale(")
        );
        const typographyWithInvalidIntrinsicSize = [...component.querySelectorAll('[data-grid-token]:not([data-grid-token-kind="graphic"])')].filter(token => {
          const text = token.querySelector(":scope > text");
          const tokenSize = text?.getAttribute("data-token-size");
          const expectedSize = TYPOGRAPHY_INTRINSIC_FONT_SIZES[tokenSize];
          return !text ||
            token.getAttribute("data-token-intrinsic-font-size") !== String(expectedSize) ||
            text.getAttribute("font-size") !== String(expectedSize);
        });
        const duplicateUniqueRoles = UNIQUE_GRID_TOKEN_ROLES.filter(role =>
          component.querySelectorAll(`[data-grid-token="${role}"]`).length > 1
        );
        const typographyWords = [...component.querySelectorAll('[data-grid-token]:not([data-grid-token-kind="graphic"]) > text[data-token-form="typography"]')]
          .map(node => typographyWordKey({ value: node.textContent }))
          .filter(Boolean);
        const duplicateTypographyWords = typographyWords.filter((word, index) => typographyWords.indexOf(word) !== index);
        const graphicTokensWithInvalidSize = [...component.querySelectorAll('[data-grid-token-kind="graphic"]')].filter(token => {
          const size = token.getAttribute("data-token-size");
          const primitive = token.querySelector(':scope > [data-token-form="graphic"]');
          return !GRAPHIC_TOKEN_SIZES.includes(size) ||
            !primitive ||
            primitive.getAttribute("data-token-size") !== size;
        });
        const barcodeTokensWithInvalidCaptionSize = [...component.querySelectorAll('[data-grid-token="barcode"]')].filter(token => {
          const expectedCaptionSize = "small";
          const expectedFontSize = String(TYPOGRAPHY_INTRINSIC_FONT_SIZES[expectedCaptionSize]);
          const captions = [...token.querySelectorAll('[data-token-role="barcode-caption"]')];
          return captions.length !== 4 || captions.some(caption =>
            caption.getAttribute("data-token-size") !== expectedCaptionSize ||
            caption.getAttribute("font-size") !== expectedFontSize
          );
        });
        const primaryTokens = component.querySelectorAll('[data-grid-token-kind="primary"]');
        const layoutIsInvalid = component.getAttribute("data-layout-grid") !== "3x3" ||
          !layout ||
          gridBlocks.length < 2 ||
          gridBlocks.length > 5 ||
          primaryTokens.length > 1 ||
          blocksWithInvalidTokenCount.length > 0 ||
          blocksWithInvalidEmptyState.length > 0 ||
          blocksWithInvalidPosition.length > 0 ||
          blocksWithInvalidFootprint.length > 0 ||
          xxxlargeFootprintBlocksWithInvalidToken.length > 0 ||
          centeredXxlargeFootprintBlocksWithInvalidToken.length > 0 ||
          tokensWithInvalidPlacement.length > 0 ||
          typographyWithInvalidIntrinsicSize.length > 0 ||
          duplicateUniqueRoles.length > 0 ||
          duplicateTypographyWords.length > 0 ||
          graphicTokensWithInvalidSize.length > 0 ||
          barcodeTokensWithInvalidCaptionSize.length > 0 ||
          allBlockCells.length !== LAYOUT_GRID.columns * LAYOUT_GRID.rows ||
          new Set(allBlockCells).size !== allBlockCells.length ||
          allBlockCells.some(cell => cell < 1 || cell > LAYOUT_GRID.columns * LAYOUT_GRID.rows);
        if (layoutIsInvalid) violations.push("invalid-layout-grid");

        const sizeOrder = Object.keys(DESIGN_TOKEN_SIZES);
        const majorStart = sizeOrder.indexOf(MAJOR_TOKEN_RULES.minSize);
        const majorSizes = sizeOrder.slice(majorStart);
        const majorTokens = [...component.querySelectorAll('text[data-token-form="typography"][data-token-context="component"]')]
          .filter(node => majorSizes.includes(node.getAttribute("data-token-size")));
        const ordinaryMajorTokens = majorTokens.filter(node =>
          !node.closest('[data-grid-token-kind="block-xxlarge"], [data-grid-token-kind="block-xxxlarge"]')
        );
        if (ordinaryMajorTokens.length > MAJOR_TOKEN_RULES.maxPerLayout) {
          violations.push(`major-token-count:${ordinaryMajorTokens.length}`);
        }
      }

      art.setAttribute("data-rule-violations", String(violations.length));
      if (violations.length) console.warn("Token rule violations", violations);
      return violations;
    }

    function render(nextSeed = randomSeed()) {
      seed = nextSeed;
      random = mulberry32(seed);
      const w = Math.max(MIN_VIEWPORT.width, window.innerWidth);
      const h = Math.max(MIN_VIEWPORT.height, window.innerHeight);
      art.setAttribute("viewBox", `0 0 ${w} ${h}`);
      art.setAttribute("style", "color: var(--ink)");
      art.setAttribute("data-grid-outlines", blockOutlinesVisible ? "visible" : "hidden");
      art.replaceChildren();
      document.body.classList.toggle("is-dark", dark);

      const bg = make("rect", { x: 0, y: 0, width: w, height: h, fill: "var(--bg)" });
      art.appendChild(bg);
      if (appMode === "composable-tokens") {
        activeComponentRatio = "composable categories";
        activeBorderMode = "catalog";
        art.appendChild(renderComposableTokensMode(w, h));
        seedLabel.textContent = `MODE COMPOSABLE CATEGORIES / SEED ${seedHex()}`;
      } else {
        art.appendChild(renderComponent(w, h));
        seedLabel.textContent = `SEED ${seedHex()} / COMP ${activeComponentRatio} / BLOCKS ${activeBlockLayout} / BORDER ${activeBorderMode}`;
      }
      validateRenderedTokenRules();
    }

    function syncBlockOutlineVisibility() {
      art.setAttribute("data-grid-outlines", blockOutlinesVisible ? "visible" : "hidden");
      art.querySelectorAll("[data-grid-block-outline]").forEach(outline => {
        outline.setAttribute("opacity", blockOutlinesVisible ? "0.18" : "0");
      });
      controls.grid.setAttribute("aria-pressed", String(blockOutlinesVisible));
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function svgText() {
      const clone = art.cloneNode(true);
      clone.setAttribute("xmlns", SVG_NS);
      clone.setAttribute("width", String(window.innerWidth));
      clone.setAttribute("height", String(window.innerHeight));
      clone.style.background = cssVar("--bg");
      const style = document.createElementNS(SVG_NS, "style");
      style.textContent = `
        @import url("${new URL(FONT_CSS_PATH, window.location.href).href}");
        svg { color: ${cssVar("--ink")}; }
        text { dominant-baseline: auto; }
      `;
      clone.insertBefore(style, clone.firstChild);
      return `<?xml version="1.0" encoding="UTF-8"?>\n${new XMLSerializer().serializeToString(clone)}`;
    }

    async function exportPng() {
      const source = svgText();
      const blob = new Blob([source], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.decoding = "async";
      img.src = url;
      await img.decode();
      const canvas = document.createElement("canvas");
      canvas.width = window.innerWidth * EXPORT_SCALE;
      canvas.height = window.innerHeight * EXPORT_SCALE;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = cssVar("--bg");
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      canvas.toBlob(pngBlob => downloadBlob(pngBlob, `micro-graphic-${seedSlug()}.png`), "image/png");
    }

    function exportSvg() {
      downloadBlob(new Blob([svgText()], { type: "image/svg+xml;charset=utf-8" }), `micro-graphic-${seedSlug()}.svg`);
    }

    function bindEvents() {
      controls.random.addEventListener("click", () => render());
      controls.mode.addEventListener("click", () => {
        appMode = appMode === "random" ? "composable-tokens" : "random";
        controls.mode.textContent = appMode === "composable-tokens" ? "Generator" : "Compose";
        controls.mode.setAttribute("aria-pressed", String(appMode === "composable-tokens"));
        render(seed);
      });
      controls.grid.addEventListener("click", () => {
        blockOutlinesVisible = !blockOutlinesVisible;
        syncBlockOutlineVisibility();
      });
      controls.png.addEventListener("click", exportPng);
      controls.svg.addEventListener("click", exportSvg);
      controls.tone.addEventListener("click", () => {
        dark = !dark;
        render(seed);
      });
      art.addEventListener("click", () => render());
      window.addEventListener("resize", () => render(seed));
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function loadTypefaces() {
      if (!document.fonts) return;

      const ready = Promise.allSettled(
        [TYPEFACES.english, TYPEFACES.korean, TYPEFACES.mono, TYPEFACES.chinese]
          .flatMap(typeface => [400, 700].map(weight => document.fonts.load(`${weight} 80px ${typeface}`)))
      ).then(() => document.fonts.ready);

      ready.then(() => render(seed)).catch(() => {});
      await Promise.race([ready, wait(900)]);
    }

    async function start() {
      bindEvents();
      await loadTypefaces();
      render(seed);
    }

    start();
  </script>
</body>
</html>
