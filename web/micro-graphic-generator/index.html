<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Micro Graphic Generator</title>
  <link rel="stylesheet" href="./fonts/fonts.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main>
    <svg id="art" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Generated typographic micro graphic"></svg>
  </main>
  <div class="controls" aria-label="Generator controls">
    <button id="random" type="button">Random</button>
    <button id="mode" type="button" aria-pressed="false">Compose</button>
    <button id="grid" type="button" aria-pressed="true" title="Toggle block grid outlines">Grid</button>
    <button id="png" type="button">PNG</button>
    <button id="svg" type="button">SVG</button>
    <button id="tone" type="button">Tone</button>
  </div>
  <div class="seed" id="seedLabel"></div>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
